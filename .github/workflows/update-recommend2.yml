name: Update Bottom Accumulation

on:
  schedule:
    # KST 18:00 (09:00 UTC) — KOSPI·KOSDAQ
    - cron: "0 9 * * *"
    # ET 18:00 EDT (22:00 UTC)
    - cron: "0 22 * * *"
    # ET 18:00 EST (23:00 UTC)
    - cron: "0 23 * * *"
  workflow_dispatch:
    inputs:
      region:
        description: "kr | us | all"
        required: false
        default: "all"

permissions:
  contents: write

concurrency:
  group: update-recommend2
  cancel-in-progress: true

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Resolve region
        id: region
        env:
          EVENT_SCHEDULE: ${{ github.event.schedule }}
          INPUT_REGION: ${{ github.event.inputs.region }}
        run: |
          if [ -n "$INPUT_REGION" ]; then
            echo "value=$INPUT_REGION" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT_SCHEDULE" = "0 9 * * *" ]; then
            echo "value=kr" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT_SCHEDULE" = "0 22 * * *" ] || [ "$EVENT_SCHEDULE" = "0 23 * * *" ]; then
            echo "value=us" >> "$GITHUB_OUTPUT"
          else
            echo "value=all" >> "$GITHUB_OUTPUT"
          fi

      - name: Build bottom accumulation snapshot
        run: python scripts/build_recommend2_standalone.py --region "${{ steps.region.outputs.value }}"

      - name: Build KR chart snapshot
        if: steps.region.outputs.value == 'kr' || steps.region.outputs.value == 'all'
        run: python scripts/build_chart_kr_snapshot.py

      - name: Build US chart snapshot
        if: steps.region.outputs.value == 'us' || steps.region.outputs.value == 'all'
        run: python scripts/build_chart_us_snapshot.py

      - name: Push recommend2 snapshot to Render API
        continue-on-error: true
        env:
          API_BASE: ${{ secrets.STOCK_API_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "${API_BASE}" ] || [ -z "${CRON_SECRET}" ]; then
            echo "Skipping Render recommend2 push."
            exit 0
          fi
          curl -fsS -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${API_BASE%/}/api/recommend2/cron/build?region=${{ steps.region.outputs.value }}&period=3mo"

      - name: Push KR chart snapshot to Render API
        if: steps.region.outputs.value == 'kr' || steps.region.outputs.value == 'all'
        continue-on-error: true
        env:
          API_BASE: ${{ secrets.STOCK_API_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "${API_BASE}" ] || [ -z "${CRON_SECRET}" ]; then
            echo "Skipping Render KR chart push."
            exit 0
          fi
          curl -fsS -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${API_BASE%/}/api/chart/cron/build?region=kr"

      - name: Push US chart snapshot to Render API
        if: steps.region.outputs.value == 'us' || steps.region.outputs.value == 'all'
        continue-on-error: true
        env:
          API_BASE: ${{ secrets.STOCK_API_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "${API_BASE}" ] || [ -z "${CRON_SECRET}" ]; then
            echo "Skipping Render US chart push."
            exit 0
          fi
          curl -fsS -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${API_BASE%/}/api/chart/cron/build?region=us"

      - name: Commit snapshots
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update snapshots [skip ci]"
          file_pattern: |
            data/recommend2-bottom-accumulation.json
            data/chart-kr-snapshot.json
            data/chart-us-snapshot.json
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
