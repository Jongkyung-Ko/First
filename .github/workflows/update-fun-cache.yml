name: Fun Page Cache Refresh

on:
  schedule:
    # KST 00:05 daily + every 3 hours (15:05 UTC = KST 00:05)
    - cron: "5 15 * * *"
    - cron: "0 */3 * * *"
  workflow_dispatch:

concurrency:
  group: fun-page-cache
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Warm Fun page caches (facts, illusions, quotes, zodiac)
        env:
          API_BASE: ${{ secrets.STOCK_API_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          API_BASE="${API_BASE:?Missing STOCK_API_URL secret}"
          API_BASE="${API_BASE%/}"
          CRON_SECRET="${CRON_SECRET:?Missing CRON_SECRET secret}"
          curl -fsS --max-time 600 -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${API_BASE}/api/joke/cron/warm-cache"
