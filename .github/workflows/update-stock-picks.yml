name: Update Stock Picks

on:
  schedule:
    # KST 08:00 (23:00 UTC)
    - cron: "0 23 * * *"
    # KST 14:00 (05:00 UTC)
    - cron: "0 5 * * *"
    # US Eastern 08:00 — 13:00 UTC (EST) / 12:00 UTC (EDT, Mar–Nov)
    - cron: "0 13 * * *"
    # US Eastern 14:00 — 19:00 UTC (EST) / 18:00 UTC (EDT)
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-stock-picks
  cancel-in-progress: true

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Build stock-picks.json
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python scripts/build_stock_picks.py

      - name: Commit snapshot
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update stock picks snapshot [skip ci]"
          file_pattern: data/stock-picks.json
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
