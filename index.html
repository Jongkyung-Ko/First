<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function () {
      var path = location.pathname;
      var base = path.indexOf("/First") !== -1 ? "/First/" : "./";
      var el = document.createElement("base");
      el.href = base;
      document.head.appendChild(el);
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to Digital World</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      overflow: hidden;
    }

    .frame {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      min-height: 0;
      overflow: hidden;
    }

    .top-page {
      flex: 0 0 auto;
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0 1.5rem;
      background: linear-gradient(135deg, #1d4ed8, #7c3aed);
      border-bottom: 2px solid #334155;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
    }

    .top-page h1 {
      display: flex;
      align-items: center;
      gap: 0.4em;
      font-size: clamp(1rem, 2.5vw, 2rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .dm-icon {
      display: inline-block;
      width: 1em;
      height: 1em;
      vertical-align: -0.12em;
      flex-shrink: 0;
      line-height: 1;
      object-fit: contain;
    }

  /* Navy icon on light surfaces; invert to white on dark backgrounds */
    .dm-icon--light,
    .top-page .dm-icon,
    .header-panel .dm-icon,
    .content-panel .dm-icon,
    .welcome-digimon-guide .dm-icon,
    .welcome-dm-guide .dm-icon,
    .digimon-guide-hero .dm-icon,
    .digimon-guide-icon .dm-icon,
    .game-tile .dm-icon {
      filter: brightness(0) invert(1);
      opacity: 0.95;
    }

    .dm-with-icon {
      display: inline-flex;
      align-items: center;
      gap: 0.35em;
      max-width: 100%;
    }

    .dm-with-icon > span {
      min-width: 0;
    }

    .dm-amount-line {
      font-variant-numeric: tabular-nums;
    }

    .header-status {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      gap: 0.2rem;
      min-width: 0;
      max-width: min(240px, 44vw);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 1;
      min-width: 0;
      justify-content: flex-end;
    }

    .header-digimon-balance {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.25em;
      color: #fde68a;
      font-size: 0.78rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      line-height: 1.2;
      white-space: nowrap;
    }

    .header-chip {
      display: block;
      max-width: 100%;
      margin: 0;
      padding: 0;
      border: none;
      background: transparent;
      font: inherit;
      text-align: right;
      cursor: default;
    }

    .header-chip.header-chip--clickable {
      cursor: pointer;
    }

    .header-chip.header-chip--clickable:hover {
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .header-chip:focus-visible {
      outline: 2px solid #fbbf24;
      outline-offset: 2px;
      border-radius: 4px;
    }

    .header-digimon-balance[hidden] {
      display: none !important;
    }

    .master-table {
      width: 100%;
      max-width: 640px;
      border-collapse: collapse;
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    .master-table th,
    .master-table td {
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid #334155;
      text-align: left;
    }

    .master-table th {
      color: #94a3b8;
      font-weight: 600;
    }

    .master-table td {
      color: #e2e8f0;
    }

    .header-user-label {
      display: block;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.78rem;
      font-weight: 600;
      line-height: 1.2;
      color: #fde68a;
      opacity: 0.95;
    }

    .header-user-label--guest {
      color: #cbd5e1;
    }

    .header-panel {
      position: fixed;
      inset: 0;
      z-index: 1100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .header-panel[hidden] {
      display: none !important;
    }

    .header-panel-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(15, 23, 42, 0.75);
    }

    .header-panel-card {
      position: relative;
      width: 100%;
      max-width: 420px;
      max-height: min(80vh, 560px);
      padding: 1.25rem;
      border-radius: 12px;
      border: 1px solid #475569;
      background: #1e293b;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .header-panel-card h3 {
      margin: 0;
      color: #f8fafc;
      font-size: 1.1rem;
    }

    .header-panel-body {
      overflow-y: auto;
      min-height: 0;
    }

    .header-profile-dl {
      margin: 0;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.5rem 1rem;
      font-size: 0.92rem;
    }

    .header-profile-dl dt {
      color: #94a3b8;
      font-weight: 600;
    }

    .header-profile-dl dd {
      margin: 0;
      color: #f1f5f9;
      word-break: break-all;
    }

    .header-panel-close {
      align-self: flex-end;
      margin-top: 0;
    }

    .header-panel-body .digimon-history-list {
      max-height: 50vh;
    }

    .bottom-page {
      flex: 1 1 auto;
      display: flex;
      min-height: 0;
      overflow: hidden;
    }

    .left-menu {
      flex: 0 0 20%;
      min-width: 180px;
      background: #1e293b;
      border-right: 1px solid #334155;
      padding: 1.5rem 1rem;
    }

    .left-menu h2 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
      margin-bottom: 1rem;
      padding-left: 0.75rem;
    }

    .menu-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .menu-item {
      width: 100%;
      text-align: left;
      padding: 0.85rem 1rem;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: #e2e8f0;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease;
    }

    .menu-item:hover:not(:disabled) {
      background: #334155;
    }

    .menu-item.active {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      font-weight: 600;
    }

    .menu-item:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .right-content {
      flex: 1 1 auto;
      min-width: 0;
      min-height: 0;
      padding: 2rem;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      background: radial-gradient(circle at top right, #1e293b 0%, #0f172a 55%);
    }

    #content-area,
    #board-root,
    #new-post-root,
    #master-root,
    #games-root,
    #stock-root {
      min-height: 0;
    }

    .games-panel {
      max-width: 720px;
    }

    .games-intro {
      margin-bottom: 1.25rem;
      color: #94a3b8;
    }

    .games-digimon-hint {
      margin-top: -0.75rem;
      color: #fbbf24;
      font-weight: 600;
    }

    .digimon-notice {
      position: fixed;
      top: 5.5rem;
      right: 1rem;
      z-index: 1200;
      max-width: min(360px, calc(100vw - 2rem));
      padding: 0.75rem 1rem;
      border-radius: 10px;
      border: 1px solid rgba(250, 204, 21, 0.45);
      background: rgba(15, 23, 42, 0.95);
      color: #fde68a;
      font-size: 0.9rem;
      font-weight: 600;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }

    .digimon-notice.success {
      border-color: rgba(74, 222, 128, 0.45);
      color: #bbf7d0;
    }

    .stock-panel {
      max-width: 720px;
      position: relative;
    }

    .stock-body {
      position: relative;
    }

    .stock-update-overlay {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-start;
      gap: 0.5rem 0.75rem;
      margin-bottom: 0.75rem;
      padding: 0.65rem 1rem;
      border-radius: 10px;
      border: 1px solid rgba(59, 130, 246, 0.35);
      background: rgba(30, 41, 59, 0.92);
      color: #e2e8f0;
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.15);
    }

    .stock-update-overlay[hidden] {
      display: none !important;
    }

    .stock-update-elapsed {
      font-variant-numeric: tabular-nums;
      color: #93c5fd;
      min-width: 2.75rem;
      flex-shrink: 0;
    }

    .stock-update-overlay-msg {
      flex: 1 1 12rem;
      font-weight: 500;
      line-height: 1.45;
      color: #cbd5e1;
    }

    .stock-update-spinner {
      width: 28px;
      height: 28px;
      border: 3px solid rgba(148, 163, 184, 0.35);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: stock-spin 0.75s linear infinite;
    }

    @keyframes stock-spin {
      to { transform: rotate(360deg); }
    }

    .stock-update-overlay-hint {
      font-size: 0.78rem;
      font-weight: normal;
      color: #94a3b8;
    }

    .stock-last-updated {
      margin: 0 0 0.75rem;
      font-size: 0.82rem;
      color: #64748b;
    }

    .stock-last-updated[hidden] {
      display: none;
    }

    .stock-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .stock-header h2 {
      margin-bottom: 0.35rem;
    }

    .stock-intro {
      color: #94a3b8;
      font-size: 0.9rem;
      line-height: 1.5;
      margin: 0;
    }

    .stock-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .stock-tab {
      padding: 0.45rem 1rem;
      border: 1px solid #475569;
      border-radius: 999px;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .stock-tab:hover {
      border-color: #64748b;
      background: #334155;
    }

    .stock-tab.active {
      border-color: #3b82f6;
      background: rgba(59, 130, 246, 0.2);
      color: #93c5fd;
    }

    .stock-status {
      font-size: 0.85rem;
      margin-bottom: 0.75rem;
      color: #94a3b8;
    }

    .stock-status-error {
      color: #fca5a5;
    }

    .stock-status-info {
      color: #94a3b8;
    }

    .stock-headline-list {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .stock-headline-card {
      padding: 0.85rem 1rem;
      border: 1px solid #334155;
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.65);
      transition: border-color 0.15s;
    }

    .stock-headline-card:hover {
      border-color: #475569;
    }

    .stock-headline-body {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
    }

    .stock-headline-thumb-link {
      flex-shrink: 0;
      display: block;
      line-height: 0;
    }

    .stock-headline-thumb {
      display: block;
      width: 72px;
      height: 72px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0f172a;
    }

    .stock-headline-thumb-link:hover .stock-headline-thumb {
      border-color: #64748b;
    }

    .stock-headline-content {
      flex: 1 1 auto;
      min-width: 0;
    }

    .stock-headline-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.4rem 0.65rem;
      margin-bottom: 0.4rem;
      font-size: 0.78rem;
      color: #94a3b8;
    }

    .stock-badge {
      padding: 0.1rem 0.45rem;
      border-radius: 4px;
      font-size: 0.72rem;
      font-weight: 600;
    }

    .stock-badge-kr {
      background: rgba(239, 68, 68, 0.2);
      color: #fca5a5;
    }

    .stock-badge-us {
      background: rgba(59, 130, 246, 0.2);
      color: #93c5fd;
    }

    .stock-sentiment {
      padding: 0.12rem 0.5rem;
      border-radius: 4px;
      font-size: 0.72rem;
      font-weight: 700;
    }

    .stock-sentiment-bullish {
      background: rgba(34, 197, 94, 0.2);
      color: #86efac;
    }

    .stock-sentiment-bearish {
      background: rgba(239, 68, 68, 0.2);
      color: #fca5a5;
    }

    .stock-sentiment-neutral {
      background: rgba(148, 163, 184, 0.2);
      color: #cbd5e1;
    }

    .stock-headline-summary {
      margin: 0.45rem 0 0;
      font-size: 0.88rem;
      line-height: 1.55;
      color: #94a3b8;
    }

    .stock-headline-summary-full {
      display: none;
      margin: 0.35rem 0 0;
      font-size: 0.88rem;
      line-height: 1.55;
      color: #cbd5e1;
    }

    .stock-headline-card--expanded .stock-headline-summary {
      display: none;
    }

    .stock-headline-card--expanded .stock-headline-summary-full {
      display: block;
    }

    .stock-headline-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem 0.75rem;
      margin-top: 0.55rem;
    }

    .stock-headline-toggle {
      padding: 0.2rem 0.55rem;
      border: 1px solid #475569;
      border-radius: 6px;
      background: transparent;
      color: #94a3b8;
      font-size: 0.78rem;
      cursor: pointer;
    }

    .stock-headline-toggle:hover {
      border-color: #64748b;
      color: #e2e8f0;
    }

    .stock-headline-source {
      font-size: 0.78rem;
      color: #60a5fa;
      text-decoration: none;
    }

    .stock-headline-source:hover {
      text-decoration: underline;
    }

    .stock-headline-ticker {
      font-family: ui-monospace, monospace;
      color: #64748b;
    }

    .stock-headline-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.45;
    }

    .stock-headline-link {
      color: #f1f5f9;
      text-decoration: none;
    }

    a.stock-headline-link:hover {
      color: #93c5fd;
      text-decoration: underline;
    }

    .stock-loading,
    .stock-empty {
      color: #94a3b8;
      text-align: center;
      padding: 2rem 1rem;
      line-height: 1.6;
    }

    .stock-loading-hint {
      font-size: 0.82rem;
      color: #64748b;
    }

    .stock-footnote {
      margin-top: 1.25rem;
      font-size: 0.78rem;
      color: #64748b;
      line-height: 1.5;
    }

    .stock-picks-gate {
      text-align: center;
      padding: 2.5rem 1.5rem;
    }

    .stock-picks-gate-message {
      margin: 1rem 0 0.5rem;
      color: #f8fafc;
      font-size: 1.05rem;
      line-height: 1.6;
    }

    .stock-picks-gate-detail {
      margin: 0 0 1rem;
      color: #94a3b8;
      font-size: 0.92rem;
    }

    .stock-picks-gate-hint {
      margin: 0;
      color: #64748b;
      font-size: 0.82rem;
    }

    .stock-picks-list {
      display: grid;
      gap: 0.85rem;
    }

    .stock-pick-card {
      border: 1px solid #334155;
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.55);
      padding: 1rem 1.1rem;
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .stock-pick-card--score-neutral {
      background: rgba(15, 23, 42, 0.55);
    }

    .stock-pick-card--score-down {
      --pick-tone-r: 59;
      --pick-tone-g: 130;
      --pick-tone-b: 246;
      --pick-tone-deep-r: 30;
      --pick-tone-deep-g: 64;
      --pick-tone-deep-b: 175;
      border-color: rgba(var(--pick-tone-r), var(--pick-tone-g), var(--pick-tone-b), 0.58);
      background: linear-gradient(
        165deg,
        rgba(var(--pick-tone-r), var(--pick-tone-g), var(--pick-tone-b), calc(var(--pick-score-alpha, 0.38) + 0.08)) 0%,
        rgba(var(--pick-tone-deep-r), var(--pick-tone-deep-g), var(--pick-tone-deep-b), var(--pick-score-alpha, 0.38)) 55%,
        rgba(15, 23, 42, 0.35) 100%
      );
    }

    .stock-pick-card--score-up {
      --pick-tone-r: 248;
      --pick-tone-g: 113;
      --pick-tone-b: 113;
      --pick-tone-deep-r: 185;
      --pick-tone-deep-g: 28;
      --pick-tone-deep-b: 28;
      border-color: rgba(var(--pick-tone-r), var(--pick-tone-g), var(--pick-tone-b), 0.58);
      background: linear-gradient(
        165deg,
        rgba(var(--pick-tone-r), var(--pick-tone-g), var(--pick-tone-b), calc(var(--pick-score-alpha, 0.38) + 0.08)) 0%,
        rgba(var(--pick-tone-deep-r), var(--pick-tone-deep-g), var(--pick-tone-deep-b), var(--pick-score-alpha, 0.38)) 55%,
        rgba(15, 23, 42, 0.35) 100%
      );
    }

    .stock-pick-card--score-down .stock-pick-rank,
    .stock-pick-card--score-up .stock-pick-rank {
      background: rgba(var(--pick-tone-r), var(--pick-tone-g), var(--pick-tone-b), calc(var(--pick-score-alpha, 0.38) * 0.55 + 0.14));
      color: #f8fafc;
    }

    .stock-pick-card--score-down .stock-pick-metric,
    .stock-pick-card--score-up .stock-pick-metric {
      background: rgba(var(--pick-tone-deep-r), var(--pick-tone-deep-g), var(--pick-tone-deep-b), calc(var(--pick-score-alpha, 0.38) * 0.42 + 0.14));
      border: 1px solid rgba(var(--pick-tone-r), var(--pick-tone-g), var(--pick-tone-b), 0.28);
    }

    .stock-pick-card--score-down .stock-pick-metric--stance.recommend,
    .stock-pick-card--score-down .stock-pick-metric--stance.watch,
    .stock-pick-card--score-down .stock-pick-metric--stance.caution,
    .stock-pick-card--score-up .stock-pick-metric--stance.recommend,
    .stock-pick-card--score-up .stock-pick-metric--stance.watch,
    .stock-pick-card--score-up .stock-pick-metric--stance.caution {
      background: rgba(var(--pick-tone-deep-r), var(--pick-tone-deep-g), var(--pick-tone-deep-b), calc(var(--pick-score-alpha, 0.38) * 0.5 + 0.16));
    }

    .stock-pick-card--score-down .stock-pick-news-panel,
    .stock-pick-card--score-up .stock-pick-news-panel {
      background: rgba(var(--pick-tone-deep-r), var(--pick-tone-deep-g), var(--pick-tone-deep-b), calc(var(--pick-score-alpha, 0.38) * 0.55 + 0.18));
      border-color: rgba(var(--pick-tone-r), var(--pick-tone-g), var(--pick-tone-b), 0.38);
    }

    .stock-pick-card--score-down .stock-pick-article,
    .stock-pick-card--score-up .stock-pick-article {
      border-bottom-color: rgba(var(--pick-tone-r), var(--pick-tone-g), var(--pick-tone-b), 0.22);
    }

    .stock-pick-card--score-down .stock-pick-thumb,
    .stock-pick-card--score-up .stock-pick-thumb {
      border-color: rgba(var(--pick-tone-r), var(--pick-tone-g), var(--pick-tone-b), 0.45);
      background: rgba(var(--pick-tone-deep-r), var(--pick-tone-deep-g), var(--pick-tone-deep-b), 0.35);
    }

    .stock-pick-card--score-down .stock-pick-thumb--initial,
    .stock-pick-card--score-up .stock-pick-thumb--initial {
      background: rgba(var(--pick-tone-r), var(--pick-tone-g), var(--pick-tone-b), calc(var(--pick-score-alpha, 0.38) * 0.5 + 0.18));
      color: #f8fafc;
    }

    .stock-pick-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 0.55rem;
    }

    .stock-pick-thumb-wrap {
      flex-shrink: 0;
    }

    .stock-pick-thumb {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      object-fit: cover;
      background: rgba(30, 41, 59, 0.9);
      border: 1px solid #334155;
    }

    .stock-pick-thumb--initial {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      font-weight: 700;
      color: #c7d2fe;

  <script>
    const dm = window.DmIcon;

    const PASSWORD_EYE_OPEN = `<svg class="password-toggle-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
    const PASSWORD_EYE_CLOSED = `<svg class="password-toggle-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a20.3 20.3 0 0 1 5.06-6.94M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a20.3 20.3 0 0 1-3.17 4.49"/><path d="M1 1l22 22"/><path d="M9.53 9.53a3 3 0 0 0 4.24 4.24"/></svg>`;

    function passwordToggleIcon() {
      return PASSWORD_EYE_OPEN;
    }

    const pages = {
      welcome: {
        title: "Digital World",
        body: `
          <figure class="welcome-hero">
            <img src="images/welcome-hero.png" alt="Digital World — gold Digi-Mon coin" width="1024" height="1024" loading="eager" decoding="async">
          </figure>

          <section class="welcome-dm-guide" aria-labelledby="welcome-dm-guide-title">
            <h3 id="welcome-dm-guide-title">${dm.withText("Digi-Mon (DM)")}</h3>
            <ul>
              <li>가입 시 <strong>100개</strong> 지급</li>
              <li><strong>차감</strong> — 게임 시작 <strong>-1</strong> · Stock Picks 입장/새로고침 <strong>-1</strong> · Stock News 새로고침 <strong>-1</strong></li>
              <li><strong>충전</strong> — 잔액 0이면 한국 시간 자정 <strong>+3</strong> · 게임 랭킹 TOP 10 <strong>+5</strong> · TOP 3 <strong>+10</strong></li>
              <li>Guest는 게임 무료 플레이, 주식은 보기만 가능 (새로고침 불가)</li>
              <li>우측 상단 DM 잔액을 누르면 사용·충전 내역 확인</li>
            </ul>
          </section>
        `
      },
      board: {
        title: "Read Post",
        body: `<div id="board-root"></div>`
      },
      games: {
        title: "Games",
        body: `<div id="games-root"></div>`
      },
      "new-post": {
        title: "Write Post",
        body: `<div id="new-post-root"></div>`
      },
      "sign-in": {
        title: "Sign-in",
        body: `
          <p>Sign in after you confirm your email. The confirmation link returns you to this site.</p>
          <form id="signin-form">
            <div class="form-group">
              <label for="signin-email">Email</label>
              <input id="signin-email" type="email" required placeholder="you@example.com">
            </div>
            <div class="form-group">
              <label for="signin-password">Password</label>
              <input id="signin-password" type="password" required placeholder="Enter your password">
            </div>
            <button class="action-btn" type="submit">Sign In</button>
          </form>
          <button class="secondary-btn" id="signin-resend-btn" type="button" hidden>Resend confirmation email</button>
          <div id="signin-message" class="auth-message" hidden></div>
        `
      },
      "sign-up": {
        title: "Sign-up",
        body: `
          <p>Create an account. We will send a confirmation email before you can sign in.</p>
          <form id="signup-form">
            <div class="form-group">
              <label for="signup-name">Full Name</label>
              <input id="signup-name" type="text" required placeholder="Your name">
            </div>
            <div class="form-group">
              <label for="signup-email">Email</label>
              <input id="signup-email" type="email" required placeholder="you@example.com">
            </div>
            <div class="form-group">
              <label for="signup-password">Password</label>
              <div class="password-input-wrap">
                <input id="signup-password" type="password" required minlength="6" placeholder="Create a password (min 6 characters)">
                <button type="button" class="password-toggle" data-password-toggle="signup-password" aria-label="비밀번호 보기" aria-pressed="false">${passwordToggleIcon()}</button>
              </div>
            </div>
            <button class="action-btn" type="submit">Create Account</button>
          </form>
          <button class="secondary-btn" id="signup-resend-btn" type="button" hidden>Resend confirmation email</button>
          <div id="signup-message" class="auth-message" hidden></div>
        `
      },
      confirm: {
        title: "비번찾기",
        body: `
          <p>이메일 가입 여부를 확인하거나, 가입한 이메일로 비밀번호 재설정 링크를 받을 수 있습니다.</p>
          <div class="form-group">
            <label for="confirm-email">Email</label>
            <input id="confirm-email" type="email" required placeholder="you@example.com">
          </div>
          <div class="confirm-actions">
            <button class="secondary-btn" type="button" id="confirm-check-btn">가입 여부 확인</button>
            <button class="action-btn" type="button" id="confirm-reset-btn">비밀번호 재설정 링크 보내기</button>
          </div>
          <div id="confirm-message" class="auth-message" hidden></div>
          <section class="password-reset-panel" id="password-reset-panel" hidden>
            <h3>새 비밀번호 설정</h3>
            <p class="profile-meta">이메일 링크로 돌아온 경우 아래에서 새 비밀번호를 입력하세요.</p>
            <form id="password-reset-form">
              <div class="form-group">
                <label for="reset-password">New Password</label>
                <div class="password-input-wrap">
                  <input id="reset-password" type="password" required minlength="6" placeholder="New password (min 6 characters)">
                  <button type="button" class="password-toggle" data-password-toggle="reset-password" aria-label="비밀번호 보기" aria-pressed="false">${passwordToggleIcon()}</button>
                </div>
              </div>
              <button class="action-btn" type="submit">비밀번호 변경</button>
            </form>
            <div id="reset-message" class="auth-message" hidden></div>
          </section>
        `
      },
      "sign-out": {
        title: "Sign-out",
        body: `
          <p>Sign out of your account or permanently delete your membership.</p>
          <div class="sign-out-actions">
            <button class="action-btn" id="page-signout-btn" type="button">Sign out</button>
            <button class="danger-btn" id="delete-account-btn" type="button">Delete account</button>
          </div>
          <div id="signout-message" class="auth-message" hidden></div>
        `
      }
    };

    const contentArea = document.getElementById("content-area");
    const menuButtons = document.querySelectorAll(".menu-item");
    const headerTitle = document.getElementById("header-title");
    const headerTitleText = document.getElementById("header-title-text");
    const headerUserLabel = document.getElementById("header-user-label");
    const digimonBalanceBtn = document.getElementById("digimon-balance");
    const guestMenuItems = document.querySelectorAll("[data-auth-guest]");
    const userMenuItems = document.querySelectorAll("[data-auth-user]");

    function ensureHeaderTitleIcon() {
      if (!headerTitle || headerTitle.querySelector(".dm-icon")) return;
      headerTitle.insertAdjacentHTML("afterbegin", dm.svg());
    }

    function setHeaderTitleText(text) {
      if (headerTitleText) {
        headerTitleText.textContent = text;
      }
    }

    function pageHeading(title) {
      if (title.includes("Digital World")) {
        return dm.withText(title);
      }
      return title;
    }

    ensureHeaderTitleIcon();
    let currentPage = "welcome";
    let pendingConfirmEmail = "";
    let pendingPasswordReset = false;
    let viewingPostId = null;

    function showGamesPage() {
      const root = document.getElementById("games-root") || contentArea;
      window.Games.renderGamesPage(root);
    }

    function showStockPage() {
      const root = document.getElementById("stock-root") || contentArea;
      window.Stock.renderStockNewsPage(root);
    }

    function showStockPicksPage() {
      const root = document.getElementById("stock-picks-root") || contentArea;
      window.Stock.renderStockPicksPage(root);
    }

    function showBoardList() {
      viewingPostId = null;
      const root = document.getElementById("board-root") || contentArea;
      window.Board.renderBoardList(
        root,
        (postId) => {
          viewingPostId = postId;
          currentPage = "board";
          menuButtons.forEach((button) => {
            button.classList.toggle("active", button.dataset.page === "board");
          });
          window.Board.renderPostDetail(root, postId, showBoardList);
        },
        () => {
          if (window.Auth.getSession()) {
            renderPage("new-post");
          } else {
            renderPage("sign-in");
          }
        }
      );
    }

    function showNewPost() {
      const root = document.getElementById("new-post-root") || contentArea;
      window.Board.renderNewPost(root, (postId) => {
        renderPage("board");
        setTimeout(() => {
          const boardRoot = document.getElementById("board-root");
          if (boardRoot) {
            window.Board.renderPostDetail(boardRoot, postId, showBoardList);
          }
        }, 50);
      });
    }

    function showMessage(elementId, text, type) {
      const element = document.getElementById(elementId);
      if (!element) return;
      element.textContent = text;
      element.className = `auth-message ${type}`;
      element.hidden = false;
    }

    function hideMessage(elementId) {
      const element = document.getElementById(elementId);
      if (element) element.hidden = true;
    }

    function getLoginId(session) {
      if (!session?.user) return "Guest";
      return session.user.email || session.user.user_metadata?.full_name || session.user.id;
    }

    let headerPanelEl = null;

    function closeHeaderPanel() {
      if (headerPanelEl) headerPanelEl.hidden = true;
    }

    function ensureHeaderPanel() {
      if (headerPanelEl) return headerPanelEl;

      headerPanelEl = document.createElement("div");
      headerPanelEl.id = "header-panel";
      headerPanelEl.className = "header-panel";
      headerPanelEl.hidden = true;
      headerPanelEl.innerHTML = `
        <div class="header-panel-backdrop" id="header-panel-backdrop"></div>
        <div class="header-panel-card" role="dialog" aria-modal="true" aria-labelledby="header-panel-title">
          <h3 id="header-panel-title"></h3>
          <div id="header-panel-body" class="header-panel-body"></div>
          <button type="button" class="secondary-btn header-panel-close" id="header-panel-close">닫기</button>
        </div>
      `;
      document.body.appendChild(headerPanelEl);
      document.getElementById("header-panel-backdrop")?.addEventListener("click", closeHeaderPanel);
      document.getElementById("header-panel-close")?.addEventListener("click", closeHeaderPanel);
      return headerPanelEl;
    }

    async function openDigimonHistoryPanel() {
      if (!window.Auth.getSession()) return;
      const panel = ensureHeaderPanel();
      const titleEl = document.getElementById("header-panel-title");
      const bodyEl = document.getElementById("header-panel-body");
      titleEl.innerHTML = dm.withText("Digi-Mon 히스토리");
      bodyEl.innerHTML = `<ul id="header-digimon-history-list" class="digimon-history-list"><li class="digimon-history-empty">불러오는 중…</li></ul>`;
      panel.hidden = false;

      const historyList = document.getElementById("header-digimon-history-list");
      if (!historyList || !window.Digimon?.getHistory) return;

      const { data: history, error } = await window.Digimon.getHistory(50);
      if (error) {
        historyList.innerHTML = `<li class="digimon-history-empty">${error}</li>`;
      } else if (!history?.length) {
        historyList.innerHTML = `<li class="digimon-history-empty">아직 Digi-Mon 사용·충전 내역이 없습니다.</li>`;
      } else {
        historyList.innerHTML = history.map((entry) => window.Digimon.formatHistoryEntry(entry)).join("");
      }
    }

    function formatProfileDate(iso) {
      if (!iso) return "—";
      return new Date(iso).toLocaleDateString("ko-KR", {
        year: "numeric",
        month: "long",
        day: "numeric"
      });
    }

    async function openProfilePanel() {
      const session = window.Auth.getSession();
      if (!session) return;

      const panel = ensureHeaderPanel();
      const titleEl = document.getElementById("header-panel-title");
      const bodyEl = document.getElementById("header-panel-body");
      titleEl.textContent = "계정 정보";
      bodyEl.innerHTML = `
        <dl class="header-profile-dl">
          <dt>아이디</dt>
          <dd id="header-profile-id">—</dd>
          <dt>가입일</dt>
          <dd id="header-profile-created">—</dd>
          <dt>Last Connected</dt>
          <dd id="header-profile-last-connected">—</dd>
          <dt><span class="dm-with-icon">${dm.svg()}<span>Digi-Mon</span></span> 잔고</dt>
          <dd id="header-profile-digimon">—</dd>
        </dl>
      `;
      panel.hidden = false;

      const idEl = document.getElementById("header-profile-id");
      const createdEl = document.getElementById("header-profile-created");
      const lastConnectedEl = document.getElementById("header-profile-last-connected");
      const digimonEl = document.getElementById("header-profile-digimon");

      idEl.textContent = getLoginId(session);
      if (window.Auth.touchLastConnected) {
        await window.Auth.touchLastConnected();
      }
      const { data } = await window.Auth.getProfile();
      if (data?.email) idEl.textContent = data.email;
      if (data?.created_at) {
        createdEl.textContent = formatProfileDate(data.created_at);
      } else if (session.user.created_at) {
        createdEl.textContent = formatProfileDate(session.user.created_at);
      }
      if (data?.last_connected_at) {
        lastConnectedEl.textContent = formatProfileDate(data.last_connected_at);
      } else if (session.user.last_sign_in_at) {
        lastConnectedEl.textContent = formatProfileDate(session.user.last_sign_in_at);
      }
      const balance = data?.digimon ?? (await window.Digimon?.getBalance?.());
      dm.setBalance(digimonEl, window.Digimon?.format(balance) ?? balance ?? 0);
    }

    function updateAuthUI(session) {
      const isLoggedIn = Boolean(session);
      const master = window.Auth.isMaster(session);

      guestMenuItems.forEach((button) => {
        button.hidden = isLoggedIn;
        button.disabled = isLoggedIn;
      });

      userMenuItems.forEach((button) => {
        button.hidden = !isLoggedIn || master;
      });

      if (headerUserLabel) {
        headerUserLabel.textContent = getLoginId(session);
        headerUserLabel.classList.toggle("header-user-label--guest", !isLoggedIn);
        headerUserLabel.classList.toggle("header-chip--clickable", isLoggedIn);
        headerUserLabel.title = isLoggedIn ? "계정 정보 보기" : "";
      }

      if (digimonBalanceBtn) {
        digimonBalanceBtn.classList.toggle("header-chip--clickable", isLoggedIn);
        digimonBalanceBtn.title = isLoggedIn ? "Digi-Mon 히스토리 보기" : "";
      }

      if (isLoggedIn) {
        setHeaderTitleText("Digital World");
        window.Digimon?.refresh();
      } else {
        closeHeaderPanel();
        setHeaderTitleText("Welcome to Digital World");
        window.Digimon?.hide();
        if (currentPage === "sign-out" || currentPage === "new-post") {
          renderPage("welcome");
        }
      }
    }

    digimonBalanceBtn?.addEventListener("click", () => openDigimonHistoryPanel());
    headerUserLabel?.addEventListener("click", () => openProfilePanel());

    async function handleResendConfirmation(email, messageId, buttonId) {
      const button = document.getElementById(buttonId);
      if (button) button.disabled = true;

      const { error } = await window.Auth.resendConfirmation(email);

      if (button) button.disabled = false;

      if (error) {
        showMessage(messageId, error.message, "error");
        return;
      }

      showMessage(
        messageId,
        `Confirmation email sent to ${email}. Check your inbox and spam folder.`,
        "success"
      );
    }

    function bindResendButton(buttonId, messageId) {
      const button = document.getElementById(buttonId);
      if (!button) return;

      button.hidden = false;
      button.onclick = () => {
        const emailInput = document.getElementById(
          buttonId === "signup-resend-btn" ? "signup-email" : "signin-email"
        );
        const email = pendingConfirmEmail || emailInput?.value.trim();
        if (!email) {
          showMessage(messageId, "Enter your email address first.", "error");
          return;
        }
        handleResendConfirmation(email, messageId, buttonId);
      };
    }

    function bindPasswordToggles(root = document) {
      root.querySelectorAll("[data-password-toggle]").forEach((button) => {
        const inputId = button.dataset.passwordToggle;
        const input = document.getElementById(inputId);
        if (!input) return;

        button.addEventListener("click", () => {
          const reveal = input.type === "password";
          input.type = reveal ? "text" : "password";
          button.innerHTML = reveal ? PASSWORD_EYE_CLOSED : PASSWORD_EYE_OPEN;
          button.setAttribute("aria-label", reveal ? "비밀번호 숨기기" : "비밀번호 보기");
          button.setAttribute("aria-pressed", reveal ? "true" : "false");
        });
      });
    }

    function showPasswordResetPanel() {
      const panel = document.getElementById("password-reset-panel");
      if (panel) panel.hidden = false;
    }

    function bindConfirmPage() {
      const checkBtn = document.getElementById("confirm-check-btn");
      const resetBtn = document.getElementById("confirm-reset-btn");
      const resetForm = document.getElementById("password-reset-form");

      bindPasswordToggles(contentArea);

      if (pendingPasswordReset) {
        showPasswordResetPanel();
        pendingPasswordReset = false;
      }

      checkBtn?.addEventListener("click", async () => {
        hideMessage("confirm-message");
        const email = document.getElementById("confirm-email")?.value.trim();
        if (!email) {
          showMessage("confirm-message", "이메일을 입력해 주세요.", "error");
          return;
        }
        if (!window.Auth.isConfigured()) {
          showMessage(
            "confirm-message",
            "Supabase is not configured. Add your URL and anon key in js/config.js.",
            "error"
          );
          return;
        }

        checkBtn.disabled = true;
        const { registered, error } = await window.Auth.checkEmailRegistered(email);
        checkBtn.disabled = false;

        if (error) {
          showMessage("confirm-message", error.message, "error");
          return;
        }

        if (registered) {
          showMessage("confirm-message", `${email} 은(는) 가입된 이메일입니다.`, "success");
        } else {
          showMessage("confirm-message", `${email} 은(는) 등록되지 않은 이메일입니다.`, "info");
        }
      });

      resetBtn?.addEventListener("click", async () => {
        hideMessage("confirm-message");
        const email = document.getElementById("confirm-email")?.value.trim();
        if (!email) {
          showMessage("confirm-message", "이메일을 입력해 주세요.", "error");
          return;
        }
        if (!window.Auth.isConfigured()) {
          showMessage(
            "confirm-message",
            "Supabase is not configured. Add your URL and anon key in js/config.js.",
            "error"
          );
          return;
        }

        resetBtn.disabled = true;
        const { registered, error: checkError } = await window.Auth.checkEmailRegistered(email);
        if (checkError) {
          resetBtn.disabled = false;
          showMessage("confirm-message", checkError.message, "error");
          return;
        }
        if (!registered) {
          resetBtn.disabled = false;
          showMessage("confirm-message", "등록된 이메일이 아닙니다. 가입 여부를 먼저 확인해 주세요.", "error");
          return;
        }

        const { error } = await window.Auth.sendPasswordReset(email);
        resetBtn.disabled = false;

        if (error) {
          showMessage("confirm-message", error.message, "error");
          return;
        }

        showMessage(
          "confirm-message",
          `${email} 로 비밀번호 재설정 링크를 보냈습니다. 받은편지함과 스팸함을 확인해 주세요.`,
          "success"
        );
      });

      resetForm?.addEventListener("submit", async (event) => {
        event.preventDefault();
        hideMessage("reset-message");

        const password = document.getElementById("reset-password")?.value || "";
        const submitBtn = resetForm.querySelector("button[type='submit']");
        if (submitBtn) submitBtn.disabled = true;

        const { error } = await window.Auth.updatePassword(password);
        if (submitBtn) submitBtn.disabled = false;

        if (error) {
          showMessage("reset-message", error.message, "error");
          return;
        }

        showMessage("reset-message", "비밀번호가 변경되었습니다.", "success");
        if (window.Auth.isPasswordRecoveryReturn?.()) {
          history.replaceState(null, "", window.Auth.getAppUrl?.() || location.pathname);
        }
        setTimeout(() => renderPage("welcome"), 1200);
      });
    }

    function bindSignOutPage() {
      const signOutBtn = document.getElementById("page-signout-btn");
      const deleteBtn = document.getElementById("delete-account-btn");

      if (signOutBtn) {
        signOutBtn.onclick = async () => {
          hideMessage("signout-message");
          signOutBtn.disabled = true;
          await window.Auth.signOut();
          signOutBtn.disabled = false;
          renderPage("welcome");
        };
      }

      if (deleteBtn) {
        deleteBtn.onclick = async () => {
          hideMessage("signout-message");

          const confirmed = window.confirm(
            "Delete your account permanently? This cannot be undone."
          );
          if (!confirmed) return;

          deleteBtn.disabled = true;
          const { error } = await window.Auth.deleteAccount();
          deleteBtn.disabled = false;

          if (error) {
            showMessage("signout-message", error.message, "error");
            return;
          }

          showMessage("signout-message", "Your account has been deleted.", "success");
          setTimeout(() => renderPage("welcome"), 1200);
        };
      }
    }

    function bindAuthForms() {
      const signInForm = document.getElementById("signin-form");
      const signUpForm = document.getElementById("signup-form");

      bindPasswordToggles(contentArea);

      if (signInForm) {
        signInForm.addEventListener("submit", async (event) => {
          event.preventDefault();
          hideMessage("signin-message");

          if (!window.Auth.isConfigured()) {
            showMessage(
              "signin-message",
              "Supabase is not configured. Add your URL and anon key in js/config.js.",
              "error"
            );
            return;
          }

          const submitBtn = signInForm.querySelector("button[type='submit']");
          submitBtn.disabled = true;

          const email = document.getElementById("signin-email").value.trim();
          const password = document.getElementById("signin-password").value;

          const { error } = await window.Auth.signIn(email, password);
          submitBtn.disabled = false;

          if (error) {
            const needsConfirm = /confirm|verified|verification/i.test(error.message);
            showMessage("signin-message", error.message, "error");
            if (needsConfirm) {
              pendingConfirmEmail = email;
              bindResendButton("signin-resend-btn", "signin-message");
            }
            return;
          }

          showMessage("signin-message", "Signed in successfully.", "success");
          renderPage("welcome");
        });
      }

      if (signUpForm) {
        signUpForm.addEventListener("submit", async (event) => {
          event.preventDefault();
          hideMessage("signup-message");

          if (!window.Auth.isConfigured()) {
            showMessage(
              "signup-message",
              "Supabase is not configured. Add your URL and anon key in js/config.js.",
              "error"
            );
            return;
          }

          const submitBtn = signUpForm.querySelector("button[type='submit']");
          submitBtn.disabled = true;

          const fullName = document.getElementById("signup-name").value.trim();
          const email = document.getElementById("signup-email").value.trim();
          const password = document.getElementById("signup-password").value;

          const { data, error, needsEmailConfirmation } = await window.Auth.signUp(
            email,
            password,
            fullName
          );
          submitBtn.disabled = false;

          if (error) {
            showMessage("signup-message", error.message, "error");
            return;
          }

          if (data.session) {
            showMessage("signup-message", "Account created. You are now signed in.", "success");
            renderPage("welcome");
            return;
          }

          if (needsEmailConfirmation) {
            pendingConfirmEmail = email;
            showMessage(
              "signup-message",
              `Account created. We sent a confirmation email to ${email}. Open the link in that email, then return here and sign in.`,
              "info"
            );
            bindResendButton("signup-resend-btn", "signup-message");
            return;
          }

          showMessage(
            "signup-message",
            `If ${email} is valid, a confirmation email has been sent. Check your inbox and spam folder.`,
            "info"
          );
        });
      }
    }

    function renderPage(pageKey) {
      if (pageKey !== "board") {
        window.Board.destroyMap();
        viewingPostId = null;
      }

      if (pageKey !== "games") {
        window.Games?.destroy?.();
      }

      if (pageKey !== "stock" && pageKey !== "stock-picks") {
        window.Stock?.destroy?.();
      }

      if (pageKey !== "sound") {
        window.Sound?.destroy?.();
      }

      currentPage = pageKey;

      menuButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.page === pageKey);
      });

      if (pageKey === "board") {
        contentArea.innerHTML = `<div id="board-root"></div>`;
        showBoardList();
        return;
      }

      if (pageKey === "games") {
        contentArea.innerHTML = `<div id="games-root"></div>`;
        showGamesPage();
        return;
      }

      if (pageKey === "stock") {
        contentArea.innerHTML = `<div id="stock-root"></div>`;
        showStockPage();
        return;
      }

      if (pageKey === "stock-picks") {
        contentArea.innerHTML = `<div id="stock-picks-root"></div>`;
        showStockPicksPage();
        return;
      }

      if (pageKey === "sound") {
        closeHeaderPanel();
        window.Sound.renderPage(contentArea);
        return;
      }

      if (pageKey === "new-post") {
        if (!window.Auth.getSession()) {
          contentArea.innerHTML = `
            <article class="content-panel">
              <h2>Write Post</h2>
              <p class="auth-message info">Please sign in to write a post.</p>
            </article>
          `;
          return;
        }
        contentArea.innerHTML = `<div id="new-post-root"></div>`;
        showNewPost();
        return;
      }

      const page = pages[pageKey];
      if (!page) return;

      contentArea.innerHTML = `
        <article class="content-panel">
          <h2>${pageHeading(page.title)}</h2>
          ${page.body}
        </article>
      `;

      bindAuthForms();

      if (pageKey === "sign-out") {
        bindSignOutPage();
      }

      if (pageKey === "confirm") {
        bindConfirmPage();
      }
    }

    menuButtons.forEach((button) => {
      button.addEventListener("click", () => {
        if (button.disabled || button.hidden) return;
        renderPage(button.dataset.page);
      });
    });

    window.Auth.init();
    if (window.IS_LOCAL_FILE_PREVIEW) {
      contentArea.insertAdjacentHTML(
        "afterbegin",
        `<div class="auth-message info">로컬 HTML 파일로 열렸습니다. Stock·로그인 기능은 <a href="https://jongkyung-ko.github.io/First/" target="_blank" rel="noopener noreferrer">GitHub Pages</a>에서 사용하세요.</div>`
      );
    }
    window.Auth.onAuthStateChange((session, event) => {
      updateAuthUI(session);
      window.Digimon?.refresh();
      window.Games?.refreshGameAccess?.();

      if (
        event === "PASSWORD_RECOVERY" ||
        (session && window.Auth.isPasswordRecoveryReturn?.())
      ) {
        pendingPasswordReset = true;
        renderPage("confirm");
        return;
      }

      if (
        session &&
        (event === "SIGNED_IN" || event === "INITIAL_SESSION") &&
        window.Auth.isEmailConfirmationReturn()
      ) {
        renderPage("welcome");
        contentArea.insertAdjacentHTML(
          "afterbegin",
          `<div class="auth-message success">Email confirmed. You are now signed in.</div>`
        );
        openProfilePanel();
      }
    });
    renderPage("welcome");
  </script>
</body>
</html>
