<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function () {
      var path = location.pathname;
      var base = path.indexOf("/First") !== -1 ? "/First/" : "./";
      var el = document.createElement("base");
      el.href = base;
      document.head.appendChild(el);
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to Digital World</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      overflow: hidden;
    }

    .frame {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      min-height: 0;
      overflow: hidden;
    }

    .top-page {
      flex: 0 0 auto;
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0 1.5rem;
      background: linear-gradient(135deg, #1d4ed8, #7c3aed);
      border-bottom: 2px solid #334155;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
    }

    .top-page h1 {
      font-size: clamp(1rem, 2.5vw, 2rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .header-user {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.9rem;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .master-btn {
      padding: 0.45rem 0.9rem;
      border: 1px solid rgba(251, 191, 36, 0.55);
      border-radius: 8px;
      background: rgba(15, 23, 42, 0.35);
      color: #fde68a;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }

    .master-btn:hover {
      background: rgba(15, 23, 42, 0.55);
    }

    .master-btn.active {
      background: rgba(251, 191, 36, 0.25);
      border-color: #fbbf24;
    }

    .master-table {
      width: 100%;
      max-width: 640px;
      border-collapse: collapse;
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    .master-table th,
    .master-table td {
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid #334155;
      text-align: left;
    }

    .master-table th {
      color: #94a3b8;
      font-weight: 600;
    }

    .master-table td {
      color: #e2e8f0;
    }

    .header-user span {
      opacity: 0.95;
    }

    .logout-btn {
      padding: 0.45rem 0.85rem;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 8px;
      background: rgba(15, 23, 42, 0.35);
      color: #fff;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .logout-btn:hover {
      background: rgba(15, 23, 42, 0.55);
    }

    .bottom-page {
      flex: 1 1 auto;
      display: flex;
      min-height: 0;
      overflow: hidden;
    }

    .left-menu {
      flex: 0 0 20%;
      min-width: 180px;
      background: #1e293b;
      border-right: 1px solid #334155;
      padding: 1.5rem 1rem;
    }

    .left-menu h2 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
      margin-bottom: 1rem;
      padding-left: 0.75rem;
    }

    .menu-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .menu-item {
      width: 100%;
      text-align: left;
      padding: 0.85rem 1rem;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: #e2e8f0;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease;
    }

    .menu-item:hover:not(:disabled) {
      background: #334155;
    }

    .menu-item.active {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      font-weight: 600;
    }

    .menu-item:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .right-content {
      flex: 1 1 auto;
      min-width: 0;
      min-height: 0;
      padding: 2rem;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      background: radial-gradient(circle at top right, #1e293b 0%, #0f172a 55%);
    }

    #content-area,
    #board-root,
    #new-post-root,
    #master-root,
    #games-root {
      min-height: 0;
    }

    .games-panel {
      max-width: 640px;
    }

    .games-intro {
      margin-bottom: 1.25rem;
      color: #94a3b8;
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .game-tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      min-height: 110px;
      padding: 1rem;
      border: 1px solid #334155;
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.6);
      color: #e2e8f0;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
    }

    .game-tile:hover:not(:disabled) {
      background: rgba(30, 41, 59, 0.9);
      border-color: #6366f1;
      transform: translateY(-2px);
    }

    .game-tile.active {
      border-color: #818cf8;
      background: rgba(99, 102, 241, 0.18);
      box-shadow: 0 0 0 1px rgba(129, 140, 248, 0.35);
    }

    .game-tile-disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .game-tile-icon {
      font-size: 1.75rem;
      line-height: 1;
    }

    .game-tile-name {
      font-size: 0.95rem;
      font-weight: 600;
    }

    .game-play-area {
      padding-top: 0.5rem;
      border-top: 1px solid #334155;
      animation: fadeIn 0.25s ease;
    }

    .minesweeper {
      max-width: 100%;
    }

    .minesweeper-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
      padding: 0.65rem 0.85rem;
      border: 1px solid #334155;
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.75);
    }

    .minesweeper-stat {
      min-width: 72px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #f8fafc;
    }

    .minesweeper-reset {
      width: 42px;
      height: 42px;
      border: 1px solid #475569;
      border-radius: 8px;
      background: #1e293b;
      font-size: 1.25rem;
      cursor: pointer;
      line-height: 1;
    }

    .minesweeper-reset:hover {
      background: #334155;
    }

    .minesweeper-board {
      display: grid;
      gap: 2px;
      width: fit-content;
      max-width: 100%;
      padding: 4px;
      border: 2px solid #475569;
      border-radius: 8px;
      background: #334155;
      user-select: none;
    }

    .mine-cell {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 4px;
      background: linear-gradient(145deg, #475569, #334155);
      color: #f8fafc;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      padding: 0;
      line-height: 32px;
    }

    .mine-cell:hover:not(:disabled) {
      background: linear-gradient(145deg, #64748b, #475569);
    }

    .mine-cell.revealed {
      background: #0f172a;
      cursor: default;
    }

    .mine-cell.revealed.mine {
      background: #7f1d1d;
    }

    .mine-cell.flagged {
      background: linear-gradient(145deg, #713f12, #92400e);
    }

    .mine-cell.n1 { color: #60a5fa; }
    .mine-cell.n2 { color: #4ade80; }
    .mine-cell.n3 { color: #f87171; }
    .mine-cell.n4 { color: #c084fc; }
    .mine-cell.n5 { color: #fbbf24; }
    .mine-cell.n6 { color: #2dd4bf; }
    .mine-cell.n7 { color: #f472b6; }
    .mine-cell.n8 { color: #94a3b8; }

    .minesweeper-hint,
    .minesweeper-status {
      margin-top: 0.75rem;
      font-size: 0.9rem;
      color: #94a3b8;
    }

    .minesweeper-status {
      color: #c7d2fe;
      font-weight: 600;
    }

    .content-panel {
      max-width: 760px;
      animation: fadeIn 0.25s ease;
    }

    .content-panel h2 {
      font-size: clamp(1.5rem, 2vw, 2rem);
      margin-bottom: 1rem;
      color: #f8fafc;
    }

    .content-panel p {
      line-height: 1.7;
      color: #cbd5e1;
      margin-bottom: 1rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.35rem;
      font-size: 0.95rem;
      color: #94a3b8;
    }

    .form-group input {
      width: 100%;
      max-width: 360px;
      padding: 0.75rem 0.9rem;
      border: 1px solid #475569;
      border-radius: 8px;
      background: #0f172a;
      color: #f8fafc;
      font-size: 1rem;
    }

    .form-group input:focus {
      outline: 2px solid #6366f1;
      border-color: transparent;
    }

    .form-group-wide input,
    .form-group-wide textarea {
      max-width: 100%;
    }

    .form-group textarea {
      width: 100%;
      max-width: 560px;
      padding: 0.75rem 0.9rem;
      border: 1px solid #475569;
      border-radius: 8px;
      background: #0f172a;
      color: #f8fafc;
      font-size: 1rem;
      font-family: inherit;
      resize: vertical;
    }

    .form-group textarea:focus {
      outline: 2px solid #6366f1;
      border-color: transparent;
    }

    .board-panel {
      max-width: 720px;
    }

    .board-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-top: 1rem;
    }

    .board-card {
      width: 100%;
      text-align: left;
      padding: 1rem 1.1rem;
      border: 1px solid #334155;
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.6);
      color: #e2e8f0;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .board-card:hover {
      background: rgba(30, 41, 59, 0.9);
      border-color: #475569;
    }

    .board-card h3 {
      font-size: 1.1rem;
      margin-bottom: 0.35rem;
      color: #f8fafc;
    }

    .board-card-meta {
      font-size: 0.85rem;
      color: #94a3b8;
      margin-bottom: 0.65rem;
    }

    .board-card-thumb {
      display: block;
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid #334155;
    }

    .board-author-id {
      font-size: 0.85rem;
      color: #94a3b8;
    }

    .post-admin-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid #334155;
    }

    .post-admin-actions .action-btn,
    .post-admin-actions .danger-btn {
      margin-top: 0;
    }

    .board-card-preview {
      font-size: 0.95rem;
      color: #cbd5e1;
      margin-bottom: 0.5rem;
      line-height: 1.5;
    }

    .board-card-tags {
      display: flex;
      gap: 0.4rem;
    }

    .board-tag {
      font-size: 0.75rem;
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      background: rgba(99, 102, 241, 0.2);
      color: #c7d2fe;
    }

    .board-empty,
    .board-loading {
      color: #94a3b8;
      font-style: italic;
    }

    .board-back-btn {
      margin-bottom: 1rem;
    }

    .post-content {
      line-height: 1.7;
      color: #cbd5e1;
      margin: 1rem 0;
      white-space: pre-wrap;
    }

    .post-image {
      max-width: 100%;
      border-radius: 10px;
      margin: 1rem 0;
      border: 1px solid #334155;
    }

    .post-image-preview {
      max-width: 280px;
      margin-top: 0.75rem;
      border-radius: 8px;
      border: 1px solid #334155;
    }

    .map-container {
      width: 100%;
      max-width: 560px;
      height: 240px;
      border-radius: 10px;
      margin-top: 0.75rem;
      border: 1px solid #334155;
      z-index: 0;
    }

    .action-btn {
      margin-top: 0.5rem;
      padding: 0.75rem 1.25rem;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }

    .action-btn:hover:not(:disabled) {
      opacity: 0.92;
    }

    .action-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .secondary-btn {
      margin-top: 0.75rem;
      padding: 0.65rem 1rem;
      border: 1px solid #475569;
      border-radius: 8px;
      background: transparent;
      color: #cbd5e1;
      font-size: 0.95rem;
      cursor: pointer;
    }

    .secondary-btn:hover:not(:disabled) {
      background: #1e293b;
    }

    .danger-btn {
      margin-top: 1.5rem;
      padding: 0.75rem 1.25rem;
      border: 1px solid rgba(239, 68, 68, 0.55);
      border-radius: 8px;
      background: rgba(239, 68, 68, 0.12);
      color: #fecaca;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }

    .danger-btn:hover:not(:disabled) {
      background: rgba(239, 68, 68, 0.22);
    }

    .danger-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .sign-out-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.75rem;
      margin-top: 1rem;
    }

    .auth-message {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      max-width: 360px;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .auth-message.error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.45);
      color: #fecaca;
    }

    .auth-message.success {
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.45);
      color: #bbf7d0;
    }

    .auth-message.info {
      background: rgba(59, 130, 246, 0.15);
      border: 1px solid rgba(59, 130, 246, 0.45);
      color: #bfdbfe;
    }

    .profile-meta {
      color: #94a3b8;
      font-size: 0.95rem;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      .top-page {
        flex: 0 0 auto;
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
        padding: 0.6rem 0.75rem;
        min-height: 52px;
      }

      .top-page h1 {
        font-size: 0.75rem;
        line-height: 1.2;
        flex: 1 1 auto;
        min-width: 0;
      }

      .header-actions {
        flex-shrink: 0;
        gap: 0.4rem;
      }

      .header-user {
        font-size: 0.75rem;
        gap: 0.4rem;
      }

      .header-user span {
        display: inline;
        max-width: 140px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .master-btn,
      .logout-btn {
        padding: 0.4rem 0.6rem;
        font-size: 0.75rem;
      }

      .bottom-page {
        flex: 1 1 auto;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
      }

      .left-menu {
        flex: 0 0 auto;
        width: 100%;
        min-width: 0;
        padding: 0.5rem 0.6rem;
        border-right: none;
        border-bottom: 1px solid #334155;
      }

      .left-menu h2 {
        display: none;
      }

      .menu-list {
        flex-direction: row;
        flex-wrap: wrap;
        gap: 0.35rem;
      }

      .menu-item {
        flex: 1 1 calc(33% - 0.35rem);
        min-width: 0;
        padding: 0.55rem 0.4rem;
        font-size: 0.8rem;
        text-align: center;
      }

      .right-content {
        flex: 1 1 auto;
        width: 100%;
        min-height: 0;
        padding: 1rem 0.85rem;
        padding-bottom: calc(1.25rem + env(safe-area-inset-bottom, 0px));
        overflow-y: auto;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
      }

      .content-panel,
      .board-panel {
        max-width: 100%;
        padding-bottom: 1rem;
      }

      .form-group input,
      .form-group textarea {
        max-width: 100%;
      }

      .auth-message {
        max-width: 100%;
      }

      .map-container {
        max-width: 100%;
        height: 200px;
      }

      .post-image,
      .post-image-preview {
        max-width: 100%;
        height: auto;
      }

      .master-table {
        display: block;
        overflow-x: auto;
        max-width: 100%;
      }

      .games-grid {
        gap: 0.5rem;
      }

      .game-tile {
        min-height: 88px;
        padding: 0.75rem 0.5rem;
      }

      .game-tile-icon {
        font-size: 1.4rem;
      }

      .game-tile-name {
        font-size: 0.8rem;
      }

      .mine-cell {
        width: 28px;
        height: 28px;
        line-height: 28px;
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <div class="frame">
    <header class="top-page">
      <h1 id="header-title">Welcome to Digital World</h1>
      <div class="header-actions">
        <button class="master-btn" id="master-btn" type="button">Master</button>
        <div class="header-user" id="header-user" hidden>
          <span id="header-user-label"></span>
          <button class="logout-btn" id="logout-btn" type="button">Logout</button>
        </div>
      </div>
    </header>

    <main class="bottom-page">
      <nav class="left-menu" aria-label="Main menu">
        <h2>Menu</h2>
        <ul class="menu-list">
          <li><button class="menu-item active" data-page="welcome">Welcome</button></li>
          <li><button class="menu-item" data-page="board">Board</button></li>
          <li><button class="menu-item" data-page="games">Games</button></li>
          <li><button class="menu-item" data-page="new-post" data-auth-user hidden>Write Post</button></li>
          <li><button class="menu-item" data-page="sign-in" data-auth-guest>Sign-in</button></li>
          <li><button class="menu-item" data-page="sign-up" data-auth-guest>Sign-up</button></li>
          <li><button class="menu-item" data-page="profile" data-auth-user hidden>Profile</button></li>
          <li><button class="menu-item" data-page="sign-out" data-auth-user hidden>Sign-out</button></li>
          <li><button class="menu-item" data-page="about">About</button></li>
        </ul>
      </nav>

      <section class="right-content" id="content-area" aria-live="polite"></section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/board.js"></script>
  <script src="js/games.js"></script>
  <script>
    const pages = {
      welcome: {
        title: "Welcome to Digital World",
        body: `
          <p>Welcome to your digital gateway. Explore the menu on the left to sign in, create an account, or learn more about this platform.</p>
          <p>Visit the <strong>Board</strong> to read community posts with images and locations.</p>
        `
      },
      board: {
        title: "Board",
        body: `<div id="board-root"></div>`
      },
      games: {
        title: "Games",
        body: `<div id="games-root"></div>`
      },
      "new-post": {
        title: "Write Post",
        body: `<div id="new-post-root"></div>`
      },
      master: {
        title: "Master",
        body: `<div id="master-root"></div>`
      },
      "sign-in": {
        title: "Sign-in",
        body: `
          <p>Sign in after you confirm your email. The confirmation link returns you to this site.</p>
          <form id="signin-form">
            <div class="form-group">
              <label for="signin-email">Email</label>
              <input id="signin-email" type="email" required placeholder="you@example.com">
            </div>
            <div class="form-group">
              <label for="signin-password">Password</label>
              <input id="signin-password" type="password" required placeholder="Enter your password">
            </div>
            <button class="action-btn" type="submit">Sign In</button>
          </form>
          <button class="secondary-btn" id="signin-resend-btn" type="button" hidden>Resend confirmation email</button>
          <div id="signin-message" class="auth-message" hidden></div>
        `
      },
      "sign-up": {
        title: "Sign-up",
        body: `
          <p>Create an account. We will send a confirmation email before you can sign in.</p>
          <form id="signup-form">
            <div class="form-group">
              <label for="signup-name">Full Name</label>
              <input id="signup-name" type="text" required placeholder="Your name">
            </div>
            <div class="form-group">
              <label for="signup-email">Email</label>
              <input id="signup-email" type="email" required placeholder="you@example.com">
            </div>
            <div class="form-group">
              <label for="signup-password">Password</label>
              <input id="signup-password" type="password" required minlength="6" placeholder="Create a password (min 6 characters)">
            </div>
            <button class="action-btn" type="submit">Create Account</button>
          </form>
          <button class="secondary-btn" id="signup-resend-btn" type="button" hidden>Resend confirmation email</button>
          <div id="signup-message" class="auth-message" hidden></div>
        `
      },
      profile: {
        title: "Your Profile",
        body: `
          <p>You are signed in.</p>
          <p><strong>Name:</strong> <span id="profile-name">—</span></p>
          <p><strong>Email:</strong> <span id="profile-email">—</span></p>
          <p class="profile-meta"><strong>Member since:</strong> <span id="profile-created">—</span></p>
        `
      },
      "sign-out": {
        title: "Sign-out",
        body: `
          <p>Sign out of your account or permanently delete your membership.</p>
          <div class="sign-out-actions">
            <button class="action-btn" id="page-signout-btn" type="button">Sign out</button>
            <button class="danger-btn" id="delete-account-btn" type="button">Delete account</button>
          </div>
          <div id="signout-message" class="auth-message" hidden></div>
        `
      },
      about: {
        title: "About",
        body: `
          <p>This is a digital world portal built with HTML, CSS, and JavaScript.</p>
          <p>Sign-in and sign-up use Supabase Auth with a PostgreSQL database for user accounts and profiles.</p>
          <p>The layout uses a 10% top header, a 20% left menu, and an 80% right content area.</p>
        `
      }
    };

    const contentArea = document.getElementById("content-area");
    const menuButtons = document.querySelectorAll(".menu-item");
    const headerTitle = document.getElementById("header-title");
    const headerUser = document.getElementById("header-user");
    const headerUserLabel = document.getElementById("header-user-label");
    const logoutBtn = document.getElementById("logout-btn");
    const masterBtn = document.getElementById("master-btn");
    const guestMenuItems = document.querySelectorAll("[data-auth-guest]");
    const userMenuItems = document.querySelectorAll("[data-auth-user]");

    let currentPage = "welcome";
    let pendingConfirmEmail = "";
    let viewingPostId = null;

    function showGamesPage() {
      const root = document.getElementById("games-root") || contentArea;
      window.Games.renderGamesPage(root);
    }

    function showBoardList() {
      viewingPostId = null;
      const root = document.getElementById("board-root") || contentArea;
      window.Board.renderBoardList(root, (postId) => {
        viewingPostId = postId;
        currentPage = "board";
        menuButtons.forEach((button) => {
          button.classList.toggle("active", button.dataset.page === "board");
        });
        window.Board.renderPostDetail(root, postId, showBoardList);
      });
    }

    function showNewPost() {
      const root = document.getElementById("new-post-root") || contentArea;
      window.Board.renderNewPost(root, (postId) => {
        renderPage("board");
        setTimeout(() => {
          const boardRoot = document.getElementById("board-root");
          if (boardRoot) {
            window.Board.renderPostDetail(boardRoot, postId, showBoardList);
          }
        }, 50);
      });
    }

    function showMessage(elementId, text, type) {
      const element = document.getElementById(elementId);
      if (!element) return;
      element.textContent = text;
      element.className = `auth-message ${type}`;
      element.hidden = false;
    }

    function hideMessage(elementId) {
      const element = document.getElementById(elementId);
      if (element) element.hidden = true;
    }

    function updateAuthUI(session) {
      const isLoggedIn = Boolean(session);
      const master = window.Auth.isMaster(session);

      guestMenuItems.forEach((button) => {
        button.hidden = isLoggedIn;
        button.disabled = isLoggedIn;
      });

      userMenuItems.forEach((button) => {
        button.hidden = !isLoggedIn || master;
      });

      masterBtn?.classList.toggle("active", master);

      if (isLoggedIn) {
        const loginId = session.user.email || session.user.id;
        headerTitle.textContent = "Digital World";
        headerUserLabel.textContent = `${loginId} 님 접속 중입니다.`;
        headerUser.hidden = false;
      } else {
        headerTitle.textContent = "Welcome to Digital World";
        headerUser.hidden = true;
        if (currentPage === "profile" || currentPage === "sign-out" || currentPage === "new-post") {
          renderPage("welcome");
        }
      }
    }

    async function loadMasterPage() {
      const root = document.getElementById("master-root");
      if (!root) return;

      const session = window.Auth.getSession();
      if (window.Auth.isMaster(session)) {
        root.innerHTML = `
          <article class="content-panel">
            <h2>Master Dashboard</h2>
            <p>Signed in as administrator. Registered users:</p>
            <div id="master-users"><p class="board-loading">Loading users...</p></div>
            <button class="action-btn" id="master-logout-btn" type="button">Master Logout</button>
          </article>
        `;

        document.getElementById("master-logout-btn")?.addEventListener("click", async () => {
          await window.Auth.signOut();
          loadMasterPage();
        });

        const { data, error } = await window.Auth.getAllProfiles();
        const usersEl = document.getElementById("master-users");
        if (!usersEl) return;

        if (error) {
          usersEl.innerHTML = `<p class="auth-message error">${error.message}</p>
            <p class="profile-meta">Run supabase/master.sql in Supabase SQL Editor if you have not already.</p>`;
          return;
        }

        if (!data?.length) {
          usersEl.innerHTML = `<p class="board-empty">No registered users yet.</p>`;
          return;
        }

        usersEl.innerHTML = `
          <table class="master-table">
            <thead>
              <tr><th>Name</th><th>Email</th><th>Joined</th></tr>
            </thead>
            <tbody>
              ${data
                .map(
                  (u) => `
                <tr>
                  <td>${u.full_name || "—"}</td>
                  <td>${u.email || "—"}</td>
                  <td>${u.created_at ? new Date(u.created_at).toLocaleDateString() : "—"}</td>
                </tr>
              `
                )
                .join("")}
            </tbody>
          </table>
        `;
        return;
      }

      root.innerHTML = `
        <article class="content-panel">
          <h2>Master Login</h2>
          <p>Administrator access. Initial password: <strong>123456</strong></p>
          <form id="master-form">
            <div class="form-group">
              <label for="master-email">Email</label>
              <input id="master-email" type="email" readonly value="${window.Auth.getMasterEmail()}">
            </div>
            <div class="form-group">
              <label for="master-password">Password</label>
              <input id="master-password" type="password" required value="${window.Auth.getMasterPassword()}" placeholder="Enter master password">
            </div>
            <button class="action-btn" type="submit">Master Sign In</button>
          </form>
          <div id="master-message" class="auth-message" hidden></div>
        </article>
      `;

      document.getElementById("master-form")?.addEventListener("submit", async (event) => {
        event.preventDefault();
        hideMessage("master-message");

        const password = document.getElementById("master-password").value;
        const submitBtn = event.target.querySelector("button[type='submit']");
        submitBtn.disabled = true;

        const { error, created } = await window.Auth.signInMaster(password);
        submitBtn.disabled = false;

        if (error) {
          showMessage("master-message", error.message, "error");
          return;
        }

        showMessage(
          "master-message",
          created ? "Master account created and signed in." : "Signed in as Master.",
          "success"
        );
        setTimeout(() => loadMasterPage(), 600);
      });
    }

    async function loadProfilePage() {
      const session = window.Auth.getSession();
      if (!session) return;

      const nameEl = document.getElementById("profile-name");
      const emailEl = document.getElementById("profile-email");
      const createdEl = document.getElementById("profile-created");

      nameEl.textContent = session.user.user_metadata?.full_name || "—";
      emailEl.textContent = session.user.email || "—";

      const { data } = await window.Auth.getProfile();
      if (data?.full_name) nameEl.textContent = data.full_name;
      if (data?.email) emailEl.textContent = data.email;
      if (data?.created_at) {
        createdEl.textContent = new Date(data.created_at).toLocaleDateString();
      }
    }

    async function handleResendConfirmation(email, messageId, buttonId) {
      const button = document.getElementById(buttonId);
      if (button) button.disabled = true;

      const { error } = await window.Auth.resendConfirmation(email);

      if (button) button.disabled = false;

      if (error) {
        showMessage(messageId, error.message, "error");
        return;
      }

      showMessage(
        messageId,
        `Confirmation email sent to ${email}. Check your inbox and spam folder.`,
        "success"
      );
    }

    function bindResendButton(buttonId, messageId) {
      const button = document.getElementById(buttonId);
      if (!button) return;

      button.hidden = false;
      button.onclick = () => {
        const emailInput = document.getElementById(
          buttonId === "signup-resend-btn" ? "signup-email" : "signin-email"
        );
        const email = pendingConfirmEmail || emailInput?.value.trim();
        if (!email) {
          showMessage(messageId, "Enter your email address first.", "error");
          return;
        }
        handleResendConfirmation(email, messageId, buttonId);
      };
    }

    function bindSignOutPage() {
      const signOutBtn = document.getElementById("page-signout-btn");
      const deleteBtn = document.getElementById("delete-account-btn");

      if (signOutBtn) {
        signOutBtn.onclick = async () => {
          hideMessage("signout-message");
          signOutBtn.disabled = true;
          await window.Auth.signOut();
          signOutBtn.disabled = false;
          renderPage("welcome");
        };
      }

      if (deleteBtn) {
        deleteBtn.onclick = async () => {
          hideMessage("signout-message");

          const confirmed = window.confirm(
            "Delete your account permanently? This cannot be undone."
          );
          if (!confirmed) return;

          deleteBtn.disabled = true;
          const { error } = await window.Auth.deleteAccount();
          deleteBtn.disabled = false;

          if (error) {
            showMessage("signout-message", error.message, "error");
            return;
          }

          showMessage("signout-message", "Your account has been deleted.", "success");
          setTimeout(() => renderPage("welcome"), 1200);
        };
      }
    }

    function bindAuthForms() {
      const signInForm = document.getElementById("signin-form");
      const signUpForm = document.getElementById("signup-form");

      if (signInForm) {
        signInForm.addEventListener("submit", async (event) => {
          event.preventDefault();
          hideMessage("signin-message");

          if (!window.Auth.isConfigured()) {
            showMessage(
              "signin-message",
              "Supabase is not configured. Add your URL and anon key in js/config.js.",
              "error"
            );
            return;
          }

          const submitBtn = signInForm.querySelector("button[type='submit']");
          submitBtn.disabled = true;

          const email = document.getElementById("signin-email").value.trim();
          const password = document.getElementById("signin-password").value;

          const { error } = await window.Auth.signIn(email, password);
          submitBtn.disabled = false;

          if (error) {
            const needsConfirm = /confirm|verified|verification/i.test(error.message);
            showMessage("signin-message", error.message, "error");
            if (needsConfirm) {
              pendingConfirmEmail = email;
              bindResendButton("signin-resend-btn", "signin-message");
            }
            return;
          }

          showMessage("signin-message", "Signed in successfully.", "success");
          renderPage("profile");
        });
      }

      if (signUpForm) {
        signUpForm.addEventListener("submit", async (event) => {
          event.preventDefault();
          hideMessage("signup-message");

          if (!window.Auth.isConfigured()) {
            showMessage(
              "signup-message",
              "Supabase is not configured. Add your URL and anon key in js/config.js.",
              "error"
            );
            return;
          }

          const submitBtn = signUpForm.querySelector("button[type='submit']");
          submitBtn.disabled = true;

          const fullName = document.getElementById("signup-name").value.trim();
          const email = document.getElementById("signup-email").value.trim();
          const password = document.getElementById("signup-password").value;

          const { data, error, needsEmailConfirmation } = await window.Auth.signUp(
            email,
            password,
            fullName
          );
          submitBtn.disabled = false;

          if (error) {
            showMessage("signup-message", error.message, "error");
            return;
          }

          if (data.session) {
            showMessage("signup-message", "Account created. You are now signed in.", "success");
            renderPage("profile");
            return;
          }

          if (needsEmailConfirmation) {
            pendingConfirmEmail = email;
            showMessage(
              "signup-message",
              `Account created. We sent a confirmation email to ${email}. Open the link in that email, then return here and sign in.`,
              "info"
            );
            bindResendButton("signup-resend-btn", "signup-message");
            return;
          }

          showMessage(
            "signup-message",
            `If ${email} is valid, a confirmation email has been sent. Check your inbox and spam folder.`,
            "info"
          );
        });
      }
    }

    function renderPage(pageKey) {
      if (pageKey !== "board") {
        window.Board.destroyMap();
        viewingPostId = null;
      }

      if (pageKey !== "games") {
        window.Games?.destroy?.();
      }

      currentPage = pageKey;

      menuButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.page === pageKey);
      });

      if (pageKey === "board") {
        contentArea.innerHTML = `<div id="board-root"></div>`;
        showBoardList();
        return;
      }

      if (pageKey === "games") {
        contentArea.innerHTML = `<div id="games-root"></div>`;
        showGamesPage();
        return;
      }

      if (pageKey === "new-post") {
        if (!window.Auth.getSession()) {
          contentArea.innerHTML = `
            <article class="content-panel">
              <h2>Write Post</h2>
              <p class="auth-message info">Please sign in to write a post.</p>
            </article>
          `;
          return;
        }
        contentArea.innerHTML = `<div id="new-post-root"></div>`;
        showNewPost();
        return;
      }

      if (pageKey === "master") {
        contentArea.innerHTML = `<div id="master-root"></div>`;
        loadMasterPage();
        return;
      }

      const page = pages[pageKey];
      if (!page) return;

      contentArea.innerHTML = `
        <article class="content-panel">
          <h2>${page.title}</h2>
          ${page.body}
        </article>
      `;

      bindAuthForms();

      if (pageKey === "profile") {
        loadProfilePage();
      }

      if (pageKey === "sign-out") {
        bindSignOutPage();
      }
    }

    menuButtons.forEach((button) => {
      button.addEventListener("click", () => {
        if (button.disabled || button.hidden) return;
        renderPage(button.dataset.page);
      });
    });

    if (masterBtn) {
      masterBtn.addEventListener("click", () => {
        renderPage("master");
      });
    }

    logoutBtn.addEventListener("click", async () => {
      await window.Auth.signOut();
      renderPage("welcome");
    });

    window.Auth.init();
    window.Auth.onAuthStateChange((session, event) => {
      updateAuthUI(session);

      if (session && currentPage === "master") {
        loadMasterPage();
      }

      if (
        session &&
        (event === "SIGNED_IN" || event === "INITIAL_SESSION") &&
        window.Auth.isEmailConfirmationReturn()
      ) {
        renderPage("profile");
        contentArea.insertAdjacentHTML(
          "afterbegin",
          `<div class="auth-message success">Email confirmed. You are now signed in.</div>`
        );
      }
    });
    renderPage("welcome");
  </script>
</body>
</html>
