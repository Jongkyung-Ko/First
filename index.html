<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function () {
      var path = location.pathname;
      var base = path.indexOf("/First") !== -1 ? "/First/" : "./";
      var el = document.createElement("base");
      el.href = base;
      document.head.appendChild(el);
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1d4ed8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Welcome to Digital World</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="images/digimon-icon-256.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      overflow: hidden;
    }

    .frame {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      min-height: 0;
      overflow: hidden;
      position: relative;
      z-index: 0;
    }

    .top-page {
      flex: 0 0 auto;
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0 1.5rem;
      background: linear-gradient(135deg, #1d4ed8, #7c3aed);
      border-bottom: 2px solid #334155;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
    }

    .top-page h1 {
      display: flex;
      align-items: center;
      gap: 0.4em;
      font-size: clamp(1rem, 2.5vw, 2rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .dm-icon {
      display: inline-block;
      width: 1em;
      height: 1em;
      vertical-align: -0.12em;
      flex-shrink: 0;
      line-height: 1;
      object-fit: contain;
    }

  /* Navy icon on light surfaces; invert to white on dark backgrounds */
    .dm-icon--light,
    .top-page .dm-icon,
    .header-panel .dm-icon,
    .content-panel .dm-icon,
    .welcome-digimon-guide .dm-icon,
    .welcome-dm-guide .dm-icon,
    .digimon-guide-hero .dm-icon,
    .digimon-guide-icon .dm-icon,
    .game-tile .dm-icon {
      filter: brightness(0) invert(1);
      opacity: 0.95;
    }

    .dm-with-icon {
      display: inline-flex;
      align-items: center;
      gap: 0.35em;
      max-width: 100%;
    }

    .dm-with-icon > span {
      min-width: 0;
    }

    .dm-amount-line {
      font-variant-numeric: tabular-nums;
    }

    .header-status {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      gap: 0.2rem;
      min-width: 0;
      max-width: min(240px, 44vw);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 1;
      min-width: 0;
      justify-content: flex-end;
    }

    .header-update-wrap {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      flex-shrink: 0;
    }

    .header-update-btn {
      flex-shrink: 0;
      width: 2.15rem;
      height: 2.15rem;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: rgba(15, 23, 42, 0.35);
      color: #f8fafc;
      font-size: 1.15rem;
      line-height: 1;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .header-update-btn:hover:not(:disabled) {
      background: rgba(15, 23, 42, 0.55);
      border-color: rgba(255, 255, 255, 0.55);
    }

    .header-update-btn:disabled {
      opacity: 0.55;
      cursor: wait;
    }

    .header-app-version {
      font-size: 0.72rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: #94a3b8;
      letter-spacing: 0.02em;
      user-select: none;
      min-width: 1.25rem;
    }

    .pwa-toast {
      position: fixed;
      z-index: 1200;
      left: 50%;
      bottom: 1rem;
      transform: translateX(-50%);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.65rem;
      max-width: min(420px, calc(100vw - 1.5rem));
      padding: 0.75rem 1rem;
      border-radius: 12px;
      border: 1px solid #475569;
      background: rgba(15, 23, 42, 0.96);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.45);
    }

    .pwa-toast[hidden] {
      display: none !important;
    }

    .pwa-toast-text {
      flex: 1;
      margin: 0;
      font-size: 0.88rem;
      color: #e2e8f0;
    }

    .pwa-toast-actions {
      display: flex;
      gap: 0.4rem;
    }

    .pwa-toast-btn {
      padding: 0.35rem 0.75rem;
      border-radius: 8px;
      border: 1px solid #475569;
      background: rgba(30, 41, 59, 0.9);
      color: #e2e8f0;
      font-size: 0.82rem;
      cursor: pointer;
    }

    .pwa-toast-btn--primary {
      border-color: #60a5fa;
      background: rgba(37, 99, 235, 0.45);
      color: #f8fafc;
    }

    .header-digimon-balance {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.25em;
      color: #fde68a;
      font-size: 0.78rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      line-height: 1.2;
      white-space: nowrap;
    }

    .header-chip {
      display: block;
      max-width: 100%;
      margin: 0;
      padding: 0;
      border: none;
      background: transparent;
      font: inherit;
      text-align: right;
      cursor: default;
    }

    .header-chip.header-chip--clickable {
      cursor: pointer;
    }

    .header-chip.header-chip--clickable:hover {
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .header-chip:focus-visible {
      outline: 2px solid #fbbf24;
      outline-offset: 2px;
      border-radius: 4px;
    }

    .header-digimon-balance[hidden] {
      display: none !important;
    }

    .master-table {
      width: 100%;
      max-width: 640px;
      border-collapse: collapse;
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    .master-table th,
    .master-table td {
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid #334155;
      text-align: left;
    }

    .master-table th {
      color: #94a3b8;
      font-weight: 600;
    }

    .master-table td {
      color: #e2e8f0;
    }

    .header-user-label {
      display: block;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.78rem;
      font-weight: 600;
      line-height: 1.2;
      color: #fde68a;
      opacity: 0.95;
    }

    .header-user-label--guest {
      color: #cbd5e1;
    }

    .header-panel {
      position: fixed;
      inset: 0;
      z-index: 1100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .header-panel[hidden] {
      display: none !important;
    }

    .header-panel-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(15, 23, 42, 0.75);
    }

    .header-panel-card {
      position: relative;
      width: 100%;
      max-width: 420px;
      max-height: min(80vh, 560px);
      padding: 1.25rem;
      border-radius: 12px;
      border: 1px solid #475569;
      background: #1e293b;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .header-panel-card h3 {
      margin: 0;
      color: #f8fafc;
      font-size: 1.1rem;
    }

    .header-panel-body {
      overflow-y: auto;
      min-height: 0;
    }

    .header-profile-dl {
      margin: 0;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.5rem 1rem;
      font-size: 0.92rem;
    }

    .header-profile-dl dt {
      color: #94a3b8;
      font-weight: 600;
    }

    .header-profile-dl dd {
      margin: 0;
      color: #f1f5f9;
      word-break: break-all;
    }

    .header-profile-digimon-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem 0.75rem;
    }

    .header-profile-dm-add {
      padding: 0.28rem 0.65rem;
      border: 1px solid #22c55e;
      border-radius: 0.45rem;
      background: rgba(34, 197, 94, 0.14);
      color: #86efac;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s ease, box-shadow 0.15s ease;
    }

    .header-profile-dm-add:hover:not(:disabled) {
      background: rgba(34, 197, 94, 0.24);
      box-shadow: 0 0 12px rgba(34, 197, 94, 0.2);
    }

    .header-profile-dm-add:disabled {
      opacity: 0.6;
      cursor: wait;
    }

    .header-panel-close {
      align-self: flex-end;
      margin-top: 0;
    }

    .header-panel-body .digimon-history-list {
      max-height: 50vh;
    }

    .bottom-page {
      flex: 1 1 auto;
      display: flex;
      min-height: 0;
      overflow: hidden;
    }

    .left-menu {
      flex: 0 0 20%;
      min-width: 180px;
      background: #1e293b;
      border-right: 1px solid #334155;
      padding: 1.5rem 1rem;
    }

    .left-menu h2 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
      margin-bottom: 1rem;
      padding-left: 0.75rem;
    }

    .menu-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .menu-item {
      width: 100%;
      text-align: left;
      padding: 0.85rem 1rem;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: #e2e8f0;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease;
    }

    .menu-item:hover:not(:disabled) {
      background: #334155;
    }

    .menu-item.active {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      font-weight: 600;
    }

    .menu-item:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .right-content {
      flex: 1 1 auto;
      min-width: 0;
      min-height: 0;
      padding: 2rem;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      background: radial-gradient(circle at top right, #1e293b 0%, #0f172a 55%);
    }

    /* Books — dark mesh gradient background */
    #content-area.books-page-active {
      position: relative;
      isolation: isolate;
      background-color: #050810;
      background-image:
        radial-gradient(ellipse 92% 78% at 6% 12%, rgba(67, 56, 202, 0.52) 0%, transparent 56%),
        radial-gradient(ellipse 78% 68% at 94% 10%, rgba(8, 145, 178, 0.34) 0%, transparent 54%),
        radial-gradient(ellipse 68% 62% at 84% 90%, rgba(109, 40, 217, 0.4) 0%, transparent 52%),
        radial-gradient(ellipse 72% 58% at 8% 86%, rgba(6, 95, 70, 0.3) 0%, transparent 50%),
        radial-gradient(ellipse 52% 48% at 50% 44%, rgba(30, 64, 175, 0.24) 0%, transparent 58%),
        radial-gradient(ellipse 38% 32% at 64% 24%, rgba(146, 64, 14, 0.14) 0%, transparent 52%);
    }

    @supports (background: mesh-gradient(red, blue)) {
      #content-area.books-page-active {
        background-image: mesh-gradient(
          to right in oklab,
          oklch(0.11 0.02 265) 0%,
          oklch(0.16 0.07 285) 28%,
          oklch(0.1 0.03 250) 52%,
          oklch(0.13 0.05 195) 76%,
          oklch(0.12 0.06 310) 100%
        );
      }
    }

    #content-area.books-page-active::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      opacity: 0.55;
      background:
        radial-gradient(ellipse 45% 40% at 22% 68%, rgba(99, 102, 241, 0.35) 0%, transparent 70%),
        radial-gradient(ellipse 40% 36% at 78% 38%, rgba(20, 184, 166, 0.22) 0%, transparent 68%);
      filter: blur(28px);
    }

    /* Games — warm mesh gradient background */
    #content-area.games-page-active {
      position: relative;
      isolation: isolate;
      background-color: #0a0812;
      background-image:
        radial-gradient(ellipse 88% 72% at 8% 14%, rgba(234, 88, 12, 0.38) 0%, transparent 55%),
        radial-gradient(ellipse 76% 66% at 92% 12%, rgba(124, 58, 237, 0.42) 0%, transparent 54%),
        radial-gradient(ellipse 70% 60% at 82% 88%, rgba(220, 38, 38, 0.28) 0%, transparent 52%),
        radial-gradient(ellipse 68% 56% at 12% 82%, rgba(5, 150, 105, 0.26) 0%, transparent 50%),
        radial-gradient(ellipse 50% 46% at 48% 42%, rgba(79, 70, 229, 0.22) 0%, transparent 58%);
    }

    @supports (background: mesh-gradient(red, blue)) {
      #content-area.games-page-active {
        background-image: mesh-gradient(
          to right in oklab,
          oklch(0.1 0.03 285) 0%,
          oklch(0.15 0.09 35) 24%,
          oklch(0.12 0.06 300) 48%,
          oklch(0.14 0.08 25) 72%,
          oklch(0.11 0.04 265) 100%
        );
      }
    }

    #content-area.games-page-active::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      opacity: 0.5;
      background:
        radial-gradient(ellipse 42% 38% at 18% 72%, rgba(251, 146, 60, 0.32) 0%, transparent 70%),
        radial-gradient(ellipse 38% 34% at 80% 32%, rgba(167, 139, 250, 0.28) 0%, transparent 68%);
      filter: blur(26px);
    }

    /* Sound — cool mesh gradient background */
    #content-area.sound-page-active {
      position: relative;
      isolation: isolate;
      background-color: #050a10;
      background-image:
        radial-gradient(ellipse 90% 74% at 10% 10%, rgba(6, 182, 212, 0.4) 0%, transparent 56%),
        radial-gradient(ellipse 78% 68% at 90% 14%, rgba(59, 130, 246, 0.36) 0%, transparent 54%),
        radial-gradient(ellipse 66% 62% at 86% 86%, rgba(16, 185, 129, 0.3) 0%, transparent 52%),
        radial-gradient(ellipse 72% 58% at 8% 84%, rgba(99, 102, 241, 0.28) 0%, transparent 50%),
        radial-gradient(ellipse 48% 44% at 52% 46%, rgba(14, 116, 144, 0.22) 0%, transparent 58%);
    }

    @supports (background: mesh-gradient(red, blue)) {
      #content-area.sound-page-active {
        background-image: mesh-gradient(
          to right in oklab,
          oklch(0.1 0.03 240) 0%,
          oklch(0.14 0.07 210) 26%,
          oklch(0.11 0.05 265) 50%,
          oklch(0.13 0.06 195) 74%,
          oklch(0.1 0.04 250) 100%
        );
      }
    }

    #content-area.sound-page-active::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      opacity: 0.52;
      background:
        radial-gradient(ellipse 44% 40% at 24% 70%, rgba(34, 211, 238, 0.3) 0%, transparent 70%),
        radial-gradient(ellipse 40% 36% at 76% 36%, rgba(96, 165, 250, 0.26) 0%, transparent 68%);
      filter: blur(28px);
    }

    /* SPACE — deep cosmos mesh gradient */
    #content-area.space-page-active {
      position: relative;
      isolation: isolate;
      background-color: #030712;
      background-image:
        radial-gradient(ellipse 88% 72% at 12% 16%, rgba(99, 102, 241, 0.38) 0%, transparent 55%),
        radial-gradient(ellipse 76% 66% at 88% 14%, rgba(14, 165, 233, 0.28) 0%, transparent 54%),
        radial-gradient(ellipse 70% 60% at 78% 88%, rgba(168, 85, 247, 0.26) 0%, transparent 52%),
        radial-gradient(ellipse 68% 56% at 14% 82%, rgba(59, 130, 246, 0.22) 0%, transparent 50%),
        radial-gradient(ellipse 50% 46% at 48% 42%, rgba(15, 23, 42, 0.35) 0%, transparent 58%);
    }

    #content-area.space-page-active::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      opacity: 0.55;
      background:
        radial-gradient(ellipse 42% 38% at 22% 62%, rgba(129, 140, 248, 0.2) 0%, transparent 70%),
        radial-gradient(ellipse 38% 34% at 76% 36%, rgba(56, 189, 248, 0.18) 0%, transparent 68%);
      filter: blur(28px);
    }

    .space-panel {
      max-width: 980px;
      margin: 0 auto;
    }

    .space-header h2 {
      margin-bottom: 0.35rem;
      text-shadow: 0 1px 18px rgba(15, 23, 42, 0.65);
    }

    .space-intro,
    .space-footnote {
      margin: 0 0 1rem;
      color: #94a3b8;
      font-size: 0.88rem;
      line-height: 1.5;
    }

    .space-footnote a {
      color: #93c5fd;
    }

    .space-tab-nav {
      display: flex;
      flex-wrap: nowrap;
      gap: 0.4rem;
      margin-bottom: 0.85rem;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .space-tab-btn {
      flex: 0 0 auto;
      padding: 0.42rem 0.72rem;
      border-radius: 999px;
      border: 1px solid rgba(100, 116, 139, 0.45);
      background: rgba(15, 23, 42, 0.62);
      color: #cbd5e1;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
    }

    .space-tab-btn.is-active {
      border-color: rgba(129, 140, 248, 0.55);
      background: rgba(79, 70, 229, 0.28);
      color: #e0e7ff;
    }

    .space-toolbar {
      margin-bottom: 0.85rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem;
    }

    .space-btn {
      padding: 0.42rem 0.85rem;
      border-radius: 999px;
      border: 1px solid rgba(100, 116, 139, 0.45);
      background: rgba(15, 23, 42, 0.62);
      color: #e2e8f0;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
    }

    .space-btn-primary {
      border-color: rgba(129, 140, 248, 0.55);
      background: rgba(79, 70, 229, 0.35);
      color: #eef2ff;
    }

    .space-status {
      margin: 0.5rem 0;
      font-size: 0.9rem;
    }

    .space-status-loading { color: #93c5fd; }
    .space-status-error { color: #fca5a5; }
    .space-status-info { color: #94a3b8; }

    .space-apod-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 0.85rem;
    }

    .space-card {
      padding: 0.85rem;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      background: rgba(8, 12, 24, 0.62);
    }

    .space-card-index {
      margin: 0 0 0.35rem;
      font-size: 0.75rem;
      color: #64748b;
    }

    .space-img-link {
      display: block;
      margin-bottom: 0.55rem;
      border-radius: 10px;
      overflow: hidden;
      line-height: 0;
    }

    .space-img {
      display: block;
      width: 100%;
      max-height: 220px;
      object-fit: cover;
      background: #0f172a;
    }

    .space-card-title {
      margin: 0 0 0.35rem;
      font-size: 0.95rem;
      line-height: 1.35;
      color: #f8fafc;
    }

    .space-card-meta {
      margin: 0 0 0.45rem;
      font-size: 0.78rem;
      color: #94a3b8;
    }

    .space-card-text {
      margin: 0;
      font-size: 0.84rem;
      line-height: 1.55;
      color: #cbd5e1;
    }

    .space-media-video {
      display: grid;
      place-items: center;
      min-height: 120px;
      margin-bottom: 0.55rem;
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.8);
      overflow: hidden;
    }

    .space-video-frame {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 0;
      background: #000;
    }

    .space-card-apod--video .space-card-text {
      color: #e2e8f0;
    }

    .space-load-more {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
      margin-top: 1rem;
      padding-top: 0.5rem;
    }

    .space-btn-load {
      min-width: 7rem;
      border-color: rgba(129, 140, 248, 0.55);
      background: rgba(79, 70, 229, 0.35);
      color: #eef2ff;
      font-size: 0.9rem;
      padding: 0.5rem 1.2rem;
    }

    .space-load-more-hint {
      font-size: 0.75rem;
      color: #64748b;
    }

    .space-link {
      color: #93c5fd;
    }

    .space-planets-layout {
      display: grid;
      gap: 0.85rem;
    }

    .space-planet-nav {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(92px, 1fr));
      gap: 0.45rem;
    }

    .space-planet-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
      padding: 0.55rem 0.35rem 0.45rem;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      background: rgba(8, 12, 24, 0.55);
      cursor: pointer;
      color: inherit;
      text-align: center;
    }

    .space-planet-card.is-active {

        lastConnectedEl.textContent = formatProfileDate(session.user.last_sign_in_at);
      }
      const balance = data?.digimon ?? (await window.Digimon?.getBalance?.());
      dm.setBalance(digimonEl, window.Digimon?.format(balance) ?? balance ?? 0);

      if (dmAddBtn) {
        const accountEmail = data?.email || session.user?.email || session.user?.user_metadata?.email || "";
        const canAddDm =
          window.Digimon?.canAdminGrantDm?.(session, data) ||
          window.Digimon?.isDmAdminEmail?.(accountEmail) ||
          String(accountEmail).trim().toLowerCase() === "maspro79@naver.com";
        dmAddBtn.hidden = !canAddDm;
        if (canAddDm) {
          dmAddBtn.removeAttribute("hidden");
        }
        dmAddBtn.disabled = false;
        dmAddBtn.textContent = `DM 추가 (+${window.Digimon?.DM_ADMIN_GRANT_AMOUNT ?? 100})`;
        dmAddBtn.onclick = async () => {
          dmAddBtn.disabled = true;
          const result = await window.Digimon.adminGrantDm();
          dmAddBtn.disabled = false;
          if (!result?.ok) {
            if (result?.error) {
              window.Digimon.showNotice(result.error, "info");
            }
            return;
          }
          dm.setBalance(digimonEl, window.Digimon.format(result.balance));
          await window.Digimon.refresh();
          await window.Games?.refreshGameAccess?.();
        };
      }
    }

    function updateAuthUI(session) {
      const isLoggedIn = Boolean(session);
      const master = window.Auth.isMaster(session);

      guestMenuItems.forEach((button) => {
        button.hidden = isLoggedIn;
        button.disabled = isLoggedIn;
      });

      userMenuItems.forEach((button) => {
        button.hidden = !isLoggedIn || master;
      });

      if (headerUserLabel) {
        headerUserLabel.textContent = getLoginId(session);
        headerUserLabel.classList.toggle("header-user-label--guest", !isLoggedIn);
        headerUserLabel.classList.toggle("header-chip--clickable", isLoggedIn);
        headerUserLabel.title = isLoggedIn ? "계정 정보 보기" : "";
      }

      if (digimonBalanceBtn) {
        digimonBalanceBtn.classList.toggle("header-chip--clickable", isLoggedIn);
        digimonBalanceBtn.title = isLoggedIn ? "Digi-Mon 히스토리 보기" : "";
      }

      if (isLoggedIn) {
        setHeaderTitleText("Digital World");
        window.Digimon?.refresh();
      } else {
        closeHeaderPanel();
        setHeaderTitleText("Welcome to Digital World");
        window.Digimon?.hide();
        if (currentPage === "sign-out" || currentPage === "new-post") {
          renderPage("welcome", { replace: true });
        }
      }
    }

    digimonBalanceBtn?.addEventListener("click", () => openDigimonHistoryPanel());
    headerUserLabel?.addEventListener("click", () => openProfilePanel());

    async function handleResendConfirmation(email, messageId, buttonId) {
      const button = document.getElementById(buttonId);
      if (button) button.disabled = true;

      const { error } = await window.Auth.resendConfirmation(email);

      if (button) button.disabled = false;

      if (error) {
        showMessage(messageId, error.message, "error");
        return;
      }

      showMessage(
        messageId,
        `Confirmation email sent to ${email}. Check your inbox and spam folder.`,
        "success"
      );
    }

    function bindResendButton(buttonId, messageId) {
      const button = document.getElementById(buttonId);
      if (!button) return;

      button.hidden = false;
      button.onclick = () => {
        const emailInput = document.getElementById(
          buttonId === "signup-resend-btn" ? "signup-email" : "signin-email"
        );
        const email = pendingConfirmEmail || emailInput?.value.trim();
        if (!email) {
          showMessage(messageId, "Enter your email address first.", "error");
          return;
        }
        handleResendConfirmation(email, messageId, buttonId);
      };
    }

    function bindPasswordToggles(root = document) {
      root.querySelectorAll("[data-password-toggle]").forEach((button) => {
        const inputId = button.dataset.passwordToggle;
        const input = document.getElementById(inputId);
        if (!input) return;

        button.addEventListener("click", () => {
          const reveal = input.type === "password";
          input.type = reveal ? "text" : "password";
          button.innerHTML = reveal ? PASSWORD_EYE_CLOSED : PASSWORD_EYE_OPEN;
          button.setAttribute("aria-label", reveal ? "비밀번호 숨기기" : "비밀번호 보기");
          button.setAttribute("aria-pressed", reveal ? "true" : "false");
        });
      });
    }

    function showPasswordResetPanel() {
      const panel = document.getElementById("password-reset-panel");
      if (panel) panel.hidden = false;
    }

    function bindConfirmPage() {
      const checkBtn = document.getElementById("confirm-check-btn");
      const resetBtn = document.getElementById("confirm-reset-btn");
      const resetForm = document.getElementById("password-reset-form");

      bindPasswordToggles(contentArea);

      if (pendingPasswordReset) {
        showPasswordResetPanel();
        pendingPasswordReset = false;
      }

      checkBtn?.addEventListener("click", async () => {
        hideMessage("confirm-message");
        const email = document.getElementById("confirm-email")?.value.trim();
        if (!email) {
          showMessage("confirm-message", "이메일을 입력해 주세요.", "error");
          return;
        }
        if (!window.Auth.isConfigured()) {
          showMessage(
            "confirm-message",
            "Supabase is not configured. Add your URL and anon key in js/config.js.",
            "error"
          );
          return;
        }

        checkBtn.disabled = true;
        const { registered, error } = await window.Auth.checkEmailRegistered(email);
        checkBtn.disabled = false;

        if (error) {
          showMessage("confirm-message", error.message, "error");
          return;
        }

        if (registered) {
          showMessage("confirm-message", `${email} 은(는) 가입된 이메일입니다.`, "success");
        } else {
          showMessage("confirm-message", `${email} 은(는) 등록되지 않은 이메일입니다.`, "info");
        }
      });

      resetBtn?.addEventListener("click", async () => {
        hideMessage("confirm-message");
        const email = document.getElementById("confirm-email")?.value.trim();
        if (!email) {
          showMessage("confirm-message", "이메일을 입력해 주세요.", "error");
          return;
        }
        if (!window.Auth.isConfigured()) {
          showMessage(
            "confirm-message",
            "Supabase is not configured. Add your URL and anon key in js/config.js.",
            "error"
          );
          return;
        }

        resetBtn.disabled = true;
        const { registered, error: checkError } = await window.Auth.checkEmailRegistered(email);
        if (checkError) {
          resetBtn.disabled = false;
          showMessage("confirm-message", checkError.message, "error");
          return;
        }
        if (!registered) {
          resetBtn.disabled = false;
          showMessage("confirm-message", "등록된 이메일이 아닙니다. 가입 여부를 먼저 확인해 주세요.", "error");
          return;
        }

        const { error } = await window.Auth.sendPasswordReset(email);
        resetBtn.disabled = false;

        if (error) {
          showMessage("confirm-message", error.message, "error");
          return;
        }

        showMessage(
          "confirm-message",
          `${email} 로 비밀번호 재설정 링크를 보냈습니다. 받은편지함과 스팸함을 확인해 주세요.`,
          "success"
        );
      });

      resetForm?.addEventListener("submit", async (event) => {
        event.preventDefault();
        hideMessage("reset-message");

        const password = document.getElementById("reset-password")?.value || "";
        const submitBtn = resetForm.querySelector("button[type='submit']");
        if (submitBtn) submitBtn.disabled = true;

        const { error } = await window.Auth.updatePassword(password);
        if (submitBtn) submitBtn.disabled = false;

        if (error) {
          showMessage("reset-message", error.message, "error");
          return;
        }

        showMessage("reset-message", "비밀번호가 변경되었습니다.", "success");
        if (window.Auth.isPasswordRecoveryReturn?.()) {
          history.replaceState(null, "", window.Auth.getAppUrl?.() || location.pathname);
        }
        setTimeout(() => renderPage("welcome", { replace: true }), 1200);
      });
    }

    function bindSignOutPage() {
      const signOutBtn = document.getElementById("page-signout-btn");
      const deleteBtn = document.getElementById("delete-account-btn");

      if (signOutBtn) {
        signOutBtn.onclick = async () => {
          hideMessage("signout-message");
          signOutBtn.disabled = true;
          await window.Auth.signOut();
          signOutBtn.disabled = false;
          renderPage("welcome", { replace: true });
        };
      }

      if (deleteBtn) {
        deleteBtn.onclick = async () => {
          hideMessage("signout-message");

          const confirmed = window.confirm(
            "Delete your account permanently? This cannot be undone."
          );
          if (!confirmed) return;

          deleteBtn.disabled = true;
          const { error } = await window.Auth.deleteAccount();
          deleteBtn.disabled = false;

          if (error) {
            showMessage("signout-message", error.message, "error");
            return;
          }

          showMessage("signout-message", "Your account has been deleted.", "success");
          setTimeout(() => renderPage("welcome", { replace: true }), 1200);
        };
      }
    }

    function bindAuthForms() {
      const signInForm = document.getElementById("signin-form");
      const signUpForm = document.getElementById("signup-form");

      bindPasswordToggles(contentArea);

      if (signInForm) {
        signInForm.addEventListener("submit", async (event) => {
          event.preventDefault();
          hideMessage("signin-message");

          if (!window.Auth.isConfigured()) {
            showMessage(
              "signin-message",
              "Supabase is not configured. Add your URL and anon key in js/config.js.",
              "error"
            );
            return;
          }

          const submitBtn = signInForm.querySelector("button[type='submit']");
          submitBtn.disabled = true;

          const email = document.getElementById("signin-email").value.trim();
          const password = document.getElementById("signin-password").value;

          const { error } = await window.Auth.signIn(email, password);
          submitBtn.disabled = false;

          if (error) {
            const needsConfirm = /confirm|verified|verification/i.test(error.message);
            showMessage("signin-message", error.message, "error");
            if (needsConfirm) {
              pendingConfirmEmail = email;
              bindResendButton("signin-resend-btn", "signin-message");
            }
            return;
          }

          showMessage("signin-message", "Signed in successfully.", "success");
          renderPage("welcome", { replace: true });
        });
      }

      if (signUpForm) {
        signUpForm.addEventListener("submit", async (event) => {
          event.preventDefault();
          hideMessage("signup-message");

          if (!window.Auth.isConfigured()) {
            showMessage(
              "signup-message",
              "Supabase is not configured. Add your URL and anon key in js/config.js.",
              "error"
            );
            return;
          }

          const submitBtn = signUpForm.querySelector("button[type='submit']");
          submitBtn.disabled = true;

          const fullName = document.getElementById("signup-name").value.trim();
          const email = document.getElementById("signup-email").value.trim();
          const password = document.getElementById("signup-password").value;

          const { data, error, needsEmailConfirmation } = await window.Auth.signUp(
            email,
            password,
            fullName
          );
          submitBtn.disabled = false;

          if (error) {
            showMessage("signup-message", error.message, "error");
            return;
          }

          if (data.session) {
            showMessage("signup-message", "Account created. You are now signed in.", "success");
            renderPage("welcome", { replace: true });
            return;
          }

          if (needsEmailConfirmation) {
            pendingConfirmEmail = email;
            showMessage(
              "signup-message",
              `Account created. We sent a confirmation email to ${email}. Open the link in that email, then return here and sign in.`,
              "info"
            );
            bindResendButton("signup-resend-btn", "signup-message");
            return;
          }

          showMessage(
            "signup-message",
            `If ${email} is valid, a confirmation email has been sent. Check your inbox and spam folder.`,
            "info"
          );
        });
      }
    }

    function applyNavigationState(navState, opts) {
      const pageKey = navState?.page || "welcome";
      window.MobileChrome?.reset?.();

      if (pageKey !== "board") {
        window.Board.destroyMap();
        viewingPostId = null;
      } else {
        viewingPostId = navState.boardPostId || null;
      }

      if (pageKey !== "games") {
        window.Games?.destroy?.();
      }

      if (pageKey !== "recommend2") {
        window.Recommend2?.leavePage?.();
      }

      if (pageKey !== "strategy-golden") {
        window.StockStrategyGolden?.leavePage?.();
      }
      if (pageKey !== "strategy-bollinger") {
        window.StockStrategyBollinger?.leavePage?.();
      }
      if (pageKey !== "strategy-rsi") {
        window.StockStrategyRsi?.leavePage?.();
      }

      if (pageKey !== "stock" && !STOCK_PICKS_FAMILY.has(pageKey)) {
        window.Stock?.destroy?.();
      }

      if (pageKey !== "chart") {
        window.DwChart?.destroy?.();
        window.Chart?.destroy?.();
      }

      if (pageKey !== "sound") {
        window.Sound?.leavePage?.();
      }

      if (pageKey !== "books") {
        window.Books?.leavePage?.();
      }

      if (pageKey !== "music") {
        window.Music?.leavePage?.();
      }

      if (pageKey !== "art") {
        window.Art?.destroy?.();
      }

      if (pageKey !== "space") {
        window.Space?.leavePage?.();
      }

      if (pageKey !== "joke") {
        window.Joke?.leavePage?.();
      }

      currentPage = pageKey;
      contentArea.classList.toggle("books-page-active", pageKey === "books");
      contentArea.classList.toggle("music-page-active", pageKey === "music");
      contentArea.classList.toggle("games-page-active", pageKey === "games");
      contentArea.classList.toggle("sound-page-active", pageKey === "sound");
      contentArea.classList.toggle("art-page-active", pageKey === "art");
      contentArea.classList.toggle("space-page-active", pageKey === "space");
      contentArea.classList.toggle("joke-page-active", pageKey === "joke");

      menuButtons.forEach((button) => {
        const menuPage = button.dataset.page;
        const isActive =
          menuPage === pageKey || (menuPage === "stock-picks" && STOCK_PICKS_FAMILY.has(pageKey));
        button.classList.toggle("active", isActive);
      });

      if (pageKey === "board") {
        contentArea.innerHTML = `<div id="board-root"></div>`;
        if (navState.boardPostId) {
          showBoardPostDetail(navState.boardPostId);
        } else {
          showBoardList();
        }
        return;
      }

      if (pageKey === "games") {
        contentArea.innerHTML = `<div id="games-root"></div>`;
        showGamesPage();
        if (navState.gamesGameId) {
          window.Games.openGameById(navState.gamesGameId, { skipNav: true });
        }
        return;
      }

      if (pageKey === "stock") {
        contentArea.innerHTML = `<div id="stock-root"></div>`;
        showStockPage();
        return;
      }

      if (pageKey === "stock-picks") {
        contentArea.innerHTML = `<div id="stock-picks-root"></div>`;
        showStockPicksPage();
        return;
      }

      if (pageKey === "recommend2") {
        contentArea.innerHTML = `<div id="recommend2-root"></div>`;
        showRecommend2Page();
        return;
      }

      if (pageKey === "strategy-golden") {
        contentArea.innerHTML = `<div id="strategy-golden-root"></div>`;
        showStrategyGoldenPage();
        return;
      }

      if (pageKey === "strategy-bollinger") {
        contentArea.innerHTML = `<div id="strategy-bollinger-root"></div>`;
        showStrategyBollingerPage();
        return;
      }

      if (pageKey === "strategy-rsi") {
        contentArea.innerHTML = `<div id="strategy-rsi-root"></div>`;
        showStrategyRsiPage();
        return;
      }

      if (pageKey === "chart") {
        contentArea.innerHTML = `<div id="chart-root"></div>`;
        showChartPage();
        return;
      }

      if (pageKey === "sound") {
        closeHeaderPanel();
        window.Sound.renderPage(contentArea);
        return;
      }

      if (pageKey === "books") {
        closeHeaderPanel();
        window.Books.renderPage(contentArea);
        if (navState.booksView === "reader" && navState.booksBookId) {
          void window.Books.openReaderById(navState.booksBookId, { skipNav: true });
        }
        return;
      }

      if (pageKey === "music") {
        closeHeaderPanel();
        window.Music.renderPage(contentArea);
        return;
      }

      if (pageKey === "art") {
        closeHeaderPanel();
        window.Art.renderPage(contentArea);
        return;
      }

      if (pageKey === "space") {
        closeHeaderPanel();
        window.Space.renderPage(contentArea);
        return;
      }

      if (pageKey === "joke") {
        closeHeaderPanel();
        window.Joke.renderPage(contentArea);
        return;
      }

      if (pageKey === "new-post") {
        if (!window.Auth.getSession()) {
          contentArea.innerHTML = `
            <article class="content-panel">
              <h2>Write Post</h2>
              <p class="auth-message info">Please sign in to write a post.</p>
            </article>
          `;
          return;
        }
        contentArea.innerHTML = `<div id="new-post-root"></div>`;
        showNewPost();
        return;
      }

      const page = pages[pageKey];
      if (!page) return;

      contentArea.innerHTML = `
        <article class="content-panel">
          <h2>${pageHeading(page.title)}</h2>
          ${page.body}
        </article>
      `;

      bindAuthForms();

      if (pageKey === "sign-out") {
        bindSignOutPage();
      }

      if (pageKey === "confirm") {
        bindConfirmPage();
      }

      window.refreshGlobalMediaBars?.();
    }

    function renderPage(pageKey, extra) {
      const navOpts = extra || {};
      const partial = { page: pageKey };
      if (navOpts.boardPostId) partial.boardPostId = navOpts.boardPostId;
      if (navOpts.booksView) partial.booksView = navOpts.booksView;
      if (navOpts.booksBookId) partial.booksBookId = navOpts.booksBookId;
      if (navOpts.gamesGameId) partial.gamesGameId = navOpts.gamesGameId;
      window.AppNavigation.navigate(partial, {
        push: navOpts.replace ? false : navOpts.push !== false,
        replace: !!navOpts.replace
      });
    }

    menuButtons.forEach((button) => {
      button.addEventListener("click", () => {
        if (button.disabled || button.hidden) return;
        renderPage(button.dataset.page);
      });
    });

    window.Auth.init();
    if (window.IS_LOCAL_FILE_PREVIEW) {
      contentArea.insertAdjacentHTML(
        "afterbegin",
        `<div class="auth-message info">로컬 HTML 파일로 열렸습니다. Stock·로그인 기능은 <a href="https://jongkyung-ko.github.io/First/" target="_blank" rel="noopener noreferrer">GitHub Pages</a>에서 사용하세요.</div>`
      );
    }
    window.Auth.onAuthStateChange((session, event) => {
      updateAuthUI(session);
      window.Digimon?.refresh();
      window.Games?.refreshGameAccess?.();

      if (
        event === "PASSWORD_RECOVERY" ||
        (session && window.Auth.isPasswordRecoveryReturn?.())
      ) {
        pendingPasswordReset = true;
        renderPage("confirm", { replace: true });
        return;
      }

      if (
        session &&
        (event === "SIGNED_IN" || event === "INITIAL_SESSION") &&
        window.Auth.isEmailConfirmationReturn()
      ) {
        renderPage("welcome", { replace: true });
        contentArea.insertAdjacentHTML(
          "afterbegin",
          `<div class="auth-message success">Email confirmed. You are now signed in.</div>`
        );
        openProfilePanel();
      }
    });
    const initialNav = window.AppNavigation.init(applyNavigationState);
    applyNavigationState(initialNav, { initial: true });
  </script>
</body>
</html>
